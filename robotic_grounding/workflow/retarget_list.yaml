# List available sequence IDs for all datasets.
#
# Downloads human_motion_data from CSS and runs each loader in --list_only mode.
# No GPU required. Outputs one text file per dataset with sequence IDs.
#
# Usage:
#   python scripts/run_osmo.py --experiment-name list-sequences \
#     --workflow-yaml workflow/retarget_list.yaml

workflow:
  name: {{workflow_name}}
  resources:
    default:
      cpu: 4
      gpu: 0
      memory: 16Gi
      storage: 100Gi

  tasks:
  - name: list-sequences
    image: {{image}}
    command:
    - /bin/bash
    args:
    - /tmp/entry.sh
    environment:
      ACCEPT_EULA: Y
      HUMAN_MOTION_DATA_DIR: "{{input:0}}"

    inputs:
    - url: {{input_url}}
    outputs:
    - url: {{output_url}}
    files:
    - path: /tmp/entry.sh
      contents: |-
        set -ex
        OUTPUT={{output}}

        echo "=== Listing TACO sequences ==="
        python scripts/retarget/taco_loader.py --list_only --device cpu > ${OUTPUT}/sequence_ids_taco.txt 2>/dev/null || true
        echo "TACO: $(wc -l < ${OUTPUT}/sequence_ids_taco.txt) sequences"

        echo "=== Listing ARCTIC sequences ==="
        python scripts/retarget/arctic_loader.py --list_only --device cpu > ${OUTPUT}/sequence_ids_arctic.txt 2>/dev/null || true
        echo "ARCTIC: $(wc -l < ${OUTPUT}/sequence_ids_arctic.txt) sequences"

        echo "=== Listing OakInk2 sequences ==="
        python scripts/retarget/oakink2_loader.py --list_only --device cpu > ${OUTPUT}/sequence_ids_oakink2.txt 2>/dev/null || true
        echo "OakInk2: $(wc -l < ${OUTPUT}/sequence_ids_oakink2.txt) sequences"

        echo ""
        echo "=== Summary ==="
        for f in ${OUTPUT}/sequence_ids_*.txt; do
          name=$(basename "$f")
          echo "  ${name}: $(wc -l < "$f") sequences"
        done

default-values:
  workflow_name: robotic_grounding_retarget_list
  image: nvcr.io/nvstaging/isaac-amr/robotic-grounding:test
  input_url: swift://pdx.s8k.io/AUTH_team-isaac/datasets/v2d/human_motion_data/
  output_url: swift://pdx.s8k.io/AUTH_team-isaac/datasets/v2d/human_motion_data/sequence_lists/

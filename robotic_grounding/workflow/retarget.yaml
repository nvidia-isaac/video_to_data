# Retarget pipeline: raw data -> loaded Parquet -> retargeted Parquet -> videos.
# Set `stages` to run a subset: load, process, reconstruct, visualize, or video.

workflow:
  name: {{workflow_name}}
  resources:
    default:
      cpu: 80
      gpu: 8
      memory: 256Gi
      storage: 200Gi

  tasks:
  - name: retarget
    image: {{image}}
    command:
    - /bin/bash
    args:
    - /tmp/entry.sh
    environment:
      ACCEPT_EULA: Y
    inputs:
    # Pull raw inputs only; generated outputs are rebuilt each run.
    - url: {{input_url}}
      regex: dataset/.*
    outputs:
    # Publish only the consumable bundle, not raw provider data.
    - dataset:
        name: retargeted_{{dataset}}_bundle
    files:
    - path: /tmp/entry.sh
      contents: |-
        set -ex
        OUTPUT={{output}}
        STAGES={{stages}}
        SHARDS={{shards}}

        # Symlink downloaded raw data into the expected local layout.
        export HUMAN_MOTION_DATA_DIR=/tmp/human_motion_data
        mkdir -p ${HUMAN_MOTION_DATA_DIR}
        ln -sfn {{input:0}} ${HUMAN_MOTION_DATA_DIR}/{{dataset}}

        FILTER_ARGS=""
        if [ -n "{{sequence_pattern}}" ]; then
          FILTER_ARGS="${FILTER_ARGS} --sequence_pattern '{{sequence_pattern}}'"
        fi
        if [ -n "{{sequence_id}}" ]; then
          FILTER_ARGS="${FILTER_ARGS} --sequence_id {{sequence_id}}"
        fi
        if [ -n "{{max_sequences}}" ]; then
          FILTER_ARGS="${FILTER_ARGS} --max_sequences {{max_sequences}}"
        fi

        LOADED_DIR=${HUMAN_MOTION_DATA_DIR}/{{dataset}}/{{dataset}}_loaded
        PROCESSED_DIR=${HUMAN_MOTION_DATA_DIR}/{{dataset}}/{{dataset}}_processed
        RECONSTRUCTED_DIR=${HUMAN_MOTION_DATA_DIR}/{{dataset}}/reconstructed_stage
        BUNDLE_ASSET_DIR=${OUTPUT}/assets
        RUNTIME_ASSET_DIR=${HUMAN_MOTION_DATA_DIR}/{{dataset}}/assets

        # Propagate background shard failures; `set -e` does not catch them.
        wait_shards() {
          local ec=0
          local shard=0
          local sc
          for pid in "$@"; do
            sc=0
            wait $pid || sc=$?
            if [ $sc -ne 0 ]; then
              echo "[ERROR] shard ${shard} (PID ${pid}) failed with exit ${sc}" >&2
              ec=$sc
            fi
            shard=$((shard+1))
          done
          return $ec
        }

        # Stage 1: Load raw data -> Parquet (sharded)
        if [ "${STAGES}" = "all" ] || [ "${STAGES}" = "load" ]; then
          echo "=== Stage 1: Loading {{dataset}} (${SHARDS} shards) ==="
          PIDS=()
          for i in $(seq 0 $((SHARDS-1))); do
            (
              export CUDA_VISIBLE_DEVICES=$i
              eval python scripts/retarget/run_loader.py \
                --dataset {{dataset}} \
                --output_dir ${LOADED_DIR} \
                --device cuda:0 \
                --save ${FILTER_ARGS} \
                --shard_id $i --num_shards ${SHARDS}
            ) &
            PIDS+=($!)
          done
          wait_shards "${PIDS[@]}"
          echo "=== Copying loaded data to output ==="
          cp -r ${LOADED_DIR} ${OUTPUT}/{{dataset}}_loaded
          if [ -d "${RUNTIME_ASSET_DIR}" ]; then
            mkdir -p ${BUNDLE_ASSET_DIR}
            cp -r ${RUNTIME_ASSET_DIR}/. ${BUNDLE_ASSET_DIR}/
          fi
        fi

        # Publish static bundle assets referenced by parquet paths.
        echo "=== Publishing static assets for {{dataset}} ==="
        python scripts/generate_rigid_urdfs.py --dataset {{dataset}} || true
        mkdir -p ${BUNDLE_ASSET_DIR}/meshes ${BUNDLE_ASSET_DIR}/urdfs
        MESH_SRC=source/robotic_grounding/robotic_grounding/assets/meshes/{{dataset}}
        if [ -d "${MESH_SRC}" ]; then
          mkdir -p ${BUNDLE_ASSET_DIR}/meshes/{{dataset}}
          cp -r ${MESH_SRC}/. ${BUNDLE_ASSET_DIR}/meshes/{{dataset}}/
        fi
        URDF_SRC=source/robotic_grounding/robotic_grounding/assets/urdfs/{{dataset}}
        if [ -d "${URDF_SRC}" ]; then
          mkdir -p ${BUNDLE_ASSET_DIR}/urdfs/{{dataset}}
          cp -r ${URDF_SRC}/. ${BUNDLE_ASSET_DIR}/urdfs/{{dataset}}/
        fi

        # Stage 2: IK retargeting -> retargeted Parquet (sharded)
        if [ "${STAGES}" = "all" ] || [ "${STAGES}" = "process" ]; then
          echo "=== Stage 2: Retargeting {{dataset}} (${SHARDS} shards) ==="
          PIDS=()
          for i in $(seq 0 $((SHARDS-1))); do
            (
              export CUDA_VISIBLE_DEVICES=$i
              eval python scripts/retarget/run_retarget.py \
                --dataset {{dataset}} \
                --input_dir ${LOADED_DIR} \
                --output_dir ${PROCESSED_DIR} \
                --device cuda:0 \
                --save ${FILTER_ARGS} \
                --shard_id $i --num_shards ${SHARDS}
            ) &
            PIDS+=($!)
          done
          wait_shards "${PIDS[@]}"
          echo "=== Copying processed data to output ==="
          cp -r ${PROCESSED_DIR} ${OUTPUT}/{{dataset}}_processed
        fi

        # Stage 3: Reconstruct support surfaces -> USD (sharded)
        if [ "${STAGES}" = "all" ] || [ "${STAGES}" = "reconstruct" ]; then
          echo "=== Stage 3: Reconstructing support surfaces for {{dataset}} (${SHARDS} shards) ==="
          RECONSTRUCT_INPUT_DIR=${OUTPUT}/{{dataset}}_loaded
          if [ ! -d "${RECONSTRUCT_INPUT_DIR}" ]; then
            RECONSTRUCT_INPUT_DIR=${LOADED_DIR}
          fi
          PIDS=()
          for i in $(seq 0 $((SHARDS-1))); do
            (
              export CUDA_VISIBLE_DEVICES=$i
              eval python scripts/reconstruct_support_surfaces.py \
                --input_dir ${RECONSTRUCT_INPUT_DIR} \
                --dataset {{dataset}} \
                ${FILTER_ARGS} \
                --shard_id $i --num_shards ${SHARDS}
            ) &
            PIDS+=($!)
          done
          wait_shards "${PIDS[@]}"
          # Some datasets have no support surfaces.
          if [ -d "${RECONSTRUCTED_DIR}" ]; then
            echo "=== Copying reconstructed data to output ==="
            cp -r ${RECONSTRUCTED_DIR} ${OUTPUT}/reconstructed_stage
          elif [ -d "${OUTPUT}/reconstructed_stage" ]; then
            echo "=== Reconstructed data already in output ==="
          else
            echo "=== No reconstructed stage to copy (no support surfaces for {{dataset}}) ==="
          fi
        fi

        # Stage 4: Viser + optional pyrender MP4s (sharded).
        if [ "${STAGES}" = "all" ] || [ "${STAGES}" = "visualize" ]; then
          echo "=== Stage 4: Generating Viser + MP4 visualizations for {{dataset}} (${SHARDS} shards) ==="
          VIS_INPUT_DIR=${OUTPUT}/{{dataset}}_processed
          if [ ! -d "${VIS_INPUT_DIR}" ]; then
            VIS_INPUT_DIR=${PROCESSED_DIR}
          fi
          MP4_ARG="--save_mp4"
          if [ "{{dataset}}" = "oakink2" ]; then
            MP4_ARG=""
            echo "  (skipping pyrender MP4 for oakink2 — long sequences OOM the pod)"
          fi
          PIDS=()
          for i in $(seq 0 $((SHARDS-1))); do
            (
              export CUDA_VISIBLE_DEVICES=$i
              eval python scripts/retarget/vis_retargeted.py \
                --input_dir ${VIS_INPUT_DIR} \
                --save_html \
                ${MP4_ARG} \
                --html_dir ${OUTPUT}/{{dataset}}_html \
                ${FILTER_ARGS} \
                --shard_id $i --num_shards ${SHARDS}
            ) &
            PIDS+=($!)
          done
          wait_shards "${PIDS[@]}"
        fi

        # Stage 5: Isaac Lab MP4s via dummy_agent (sharded).
        if [ "${STAGES}" = "all" ] || [ "${STAGES}" = "video" ]; then
          echo "=== Stage 5: Recording scene videos for {{dataset}} (${SHARDS} shards) ==="
          VIDEO_DIR=${OUTPUT}/{{dataset}}_videos
          mkdir -p ${VIDEO_DIR}

          # Render from the published bundle view so asset paths resolve under ${OUTPUT}.
          VIDEO_PROCESSED_DIR=${OUTPUT}/{{dataset}}_processed
          SEQ_DIRS=(${VIDEO_PROCESSED_DIR}/sequence_id=*/robot_name=*)

          PIDS=()
          for shard in $(seq 0 $((SHARDS-1))); do
            (
              export CUDA_VISIBLE_DEVICES=$shard
              for idx in "${!SEQ_DIRS[@]}"; do
                if [ $((idx % SHARDS)) -ne $shard ]; then
                  continue
                fi
                SEQ_DIR="${SEQ_DIRS[$idx]}"
                [ -d "${SEQ_DIR}" ] || continue
                # URL-decode partition names without calling the python wrapper.
                RAW_ID=$(basename $(dirname "${SEQ_DIR}") | sed 's|sequence_id=||')
                # shellcheck disable=SC2059  # intentional: %b interprets \xHH
                SEQ_ID=$(printf '%b' "${RAW_ID//%/\\x}")
                # Allow partial resume.
                [ -f "${VIDEO_DIR}/${SEQ_ID}.mp4" ] && continue
                # Shard-scoped temp dir avoids collisions.
                TMP_VID=/tmp/scene_video_shard${shard}_${SEQ_ID}
                rm -rf ${TMP_VID}
                # Timeout prevents hung Omniverse shutdowns; sentinel feeds Stage 6.
                OUTPUT_SEQ_DIR=${SEQ_DIR}
                timeout --signal=KILL 300 python scripts/rsl_rl/dummy_agent.py \
                  --task Sharpa-V2P-v0-Play \
                  --motion_file ${SEQ_DIR} \
                  --num_envs 1 --headless \
                  --record_video --output_dir ${TMP_VID} --video_length 300 \
                  --success_marker ${OUTPUT_SEQ_DIR}/.dummy_agent_ok || true
                if [ -f "${TMP_VID}/rl-video-step-0.mp4" ]; then
                  mv ${TMP_VID}/rl-video-step-0.mp4 ${VIDEO_DIR}/${SEQ_ID}.mp4
                fi
                rm -rf ${TMP_VID}
              done
            ) &
            PIDS+=($!)
          done
          wait_shards "${PIDS[@]}"

          # Stage 6: move rejected sequences aside and publish quality metrics.
          if [ -d "${OUTPUT}/{{dataset}}_processed" ]; then
            echo "=== Stage 6: Data quality filter ==="
            REJECT_FILE=/tmp/{{dataset}}_rejected.txt
            QUALITY_CSV=${OUTPUT}/{{dataset}}_quality.csv
            rm -f "${REJECT_FILE}"
            python scripts/data_assessor.py \
              --input_dir ${OUTPUT}/{{dataset}}_processed \
              --reject --output_reject ${REJECT_FILE} \
              --output_csv ${QUALITY_CSV} || true

            INVALID_DIR=${OUTPUT}/{{dataset}}_processed_invalid
            mkdir -p "${INVALID_DIR}"
            moved=0
            if [ -s "${REJECT_FILE}" ]; then
              while IFS= read -r SEQ_ID; do
                [ -z "${SEQ_ID}" ] && continue
                SRC="${OUTPUT}/{{dataset}}_processed/sequence_id=${SEQ_ID}"
                [ -d "${SRC}" ] && mv "${SRC}" "${INVALID_DIR}/" && moved=$((moved+1))
              done < "${REJECT_FILE}"
            fi
            # Strip workflow-internal sentinels before publishing.
            find "${OUTPUT}/{{dataset}}_processed" -name .dummy_agent_ok -delete 2>/dev/null || true
            find "${INVALID_DIR}" -name .dummy_agent_ok -delete 2>/dev/null || true
            [ ${moved} -eq 0 ] && rmdir "${INVALID_DIR}" 2>/dev/null || true
            echo "=== Stage 6: moved ${moved} invalid sequence(s); quality CSV: ${QUALITY_CSV} ==="
          fi
        fi

        cat > ${OUTPUT}/manifest.json <<EOF
        {
          "schema_version": 1,
          "dataset": "{{dataset}}",
          "bundle_type": "robotic_grounding_consumable",
          "raw_provider_data_included": false,
          "paths": {
            "meshes": "assets/meshes/{{dataset}}",
            "urdfs": "assets/urdfs/{{dataset}}",
            "loaded": "{{dataset}}_loaded",
            "processed": "{{dataset}}_processed",
            "support_surfaces": "reconstructed_stage",
            "videos": "{{dataset}}_videos",
            "html": "{{dataset}}_html",
            "quality": "{{dataset}}_quality.csv"
          }
        }
        EOF

        echo "=== Done ==="

default-values:
  workflow_name: robotic_grounding_retarget
  image: nvcr.io/nvstaging/isaac-amr/robotic-grounding:datasets
  stages: all
  dataset: arctic
  input_url: swift://pdx.s8k.io/AUTH_team-isaac/datasets/v2d/human_motion_data/{{dataset}}/
  output_url: swift://pdx.s8k.io/AUTH_team-isaac/datasets/v2d/human_motion_data/{{dataset}}/
  sequence_pattern: ".*"
  sequence_id: ""
  max_sequences: ""
  # Number of per-stage workers, pinned to CUDA_VISIBLE_DEVICES=<shard_id>.
  shards: "8"

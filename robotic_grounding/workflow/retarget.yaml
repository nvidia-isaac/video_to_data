# Retarget pipeline: loaded Parquet -> retargeted Parquet -> support surfaces.
#
# The LOAD stage (raw dataset -> {dataset}_loaded Parquet via MANO FK) runs
# SEPARATELY in the reconstruction `v2d_task_library_loader` load workflow
# (manotorch/GPL-3.0, contained there); this workflow consumes its
# `{dataset}_loaded` output.
#
# Controls which stages run via the `stages` parameter:
#   all         - run every stage below (default)
#   process     - loaded Parquet -> retargeted Parquet (IK) + rigid URDFs
#   reconstruct - loaded Parquet -> support surface USD
#   visualize   - retargeted Parquet -> offline Viser + robot-hand MP4s (pyrender)
#   video       - retargeted Parquet -> Isaac Lab MP4s with robot hands (dummy_agent)
#
# HOT3D-only behavior:
#   Stage 1.6 (before retarget, on the loaded Parquet) splits ~90-second HOT3D
#   sequences into atomic hand-object interaction clips. All subsequent stages
#   (URDFs, retarget, visualize, video, quality filter) then operate on segments.
#   Penetration filtering happens transparently in Stage 6 via the auto-
#   discovered hand_penetration data_quality_check.
#
# Usage:
#   # Full pipeline
#   python scripts/run_osmo.py --experiment-name retarget-taco \
#     --image nvcr.io/nvstaging/isaac-amr/robotic-grounding:datasets \
#     --workflow-yaml workflow/retarget.yaml --set dataset=taco
#
#   # (Load runs separately — see reconstruction/workflows/task_library_load/.)
#
#   # Process only (IK retargeting)
#   python scripts/run_osmo.py --experiment-name retarget-taco-process \
#     --workflow-yaml workflow/retarget.yaml --set dataset=taco --set stages=process
#
#   # With filtering:
#   python scripts/run_osmo.py --experiment-name retarget-taco-screw \
#     --image nvcr.io/nvstaging/isaac-amr/robotic-grounding:datasets \
#     --workflow-yaml workflow/retarget.yaml --set dataset=taco \
#     --set 'sequence_pattern=.*(screw|stir).*'

workflow:
  name: {{workflow_name}}
  resources:
    default:
      cpu: 80
      gpu: 8
      memory: 256Gi
      storage: 200Gi

  tasks:
  - name: retarget
    image: {{image}}
    command:
    - /bin/bash
    args:
    - /tmp/entry.sh
    environment:
      ACCEPT_EULA: Y
    inputs:
    # Consume the {{dataset}}_loaded Parquet produced by the reconstruction
    # `v2d_task_library_loader` load workflow (raw -> MANO FK -> loaded). The raw
    # dataset is no longer pulled here — every stage below reads the loaded /
    # processed Parquet (Stage 1.5 reads baked object meshes). Fine-grained
    # sequence filtering happens in the Python scripts via FILTER_ARGS below.
    - url: {{input_url}}
      regex: {{dataset}}_loaded/.*
    outputs:
    # Publish the whole {{output}} folder to a swift prefix, mirroring the
    # reconstruction load workflow's url-based output. (Previously a versioned
    # OSMO `dataset:`, but the isaac dataset bucket is read-only; swift writes
    # via the team AUTH path still work.) The stage scripts write
    # {{dataset}}_processed / {{dataset}}_urdfs / reconstructed_stage / … under
    # {{output}}, which land beside the loaded data at output_url. For
    # experiments, override output_url to a scratch prefix so you don't
    # overwrite the canonical {{dataset}}_processed.
    - url: {{output_url}}
    files:
    - path: /tmp/entry.sh
      contents: |-
        set -ex
        OUTPUT={{output}}
        STAGES={{stages}}
        SHARDS={{shards}}

        # Symlink downloaded dataset into the expected path structure
        export HUMAN_MOTION_DATA_DIR=/tmp/human_motion_data
        mkdir -p ${HUMAN_MOTION_DATA_DIR}
        ln -sfn {{input:0}} ${HUMAN_MOTION_DATA_DIR}/{{dataset}}

        FILTER_ARGS=""
        if [ -n "{{sequence_pattern}}" ]; then
          FILTER_ARGS="${FILTER_ARGS} --sequence_pattern '{{sequence_pattern}}'"
        fi
        if [ -n "{{sequence_id}}" ]; then
          FILTER_ARGS="${FILTER_ARGS} --sequence_id {{sequence_id}}"
        fi
        if [ -n "{{max_sequences}}" ]; then
          FILTER_ARGS="${FILTER_ARGS} --max_sequences {{max_sequences}}"
        fi

        LOADED_DIR=${HUMAN_MOTION_DATA_DIR}/{{dataset}}/{{dataset}}_loaded
        PROCESSED_DIR=${HUMAN_MOTION_DATA_DIR}/{{dataset}}/{{dataset}}_processed
        RECONSTRUCTED_DIR=${HUMAN_MOTION_DATA_DIR}/{{dataset}}/reconstructed_stage

        # Wait on all background shard PIDs; tag any failure by shard index
        # (not PID) so the log is easy to grep for "[ERROR] shard N", and
        # propagate a non-zero exit so `set -e` aborts the stage (bash doesn't
        # trigger set -e on background-job failures, hence manual checking).
        wait_shards() {
          local ec=0
          local shard=0
          local sc
          for pid in "$@"; do
            sc=0
            wait $pid || sc=$?
            if [ $sc -ne 0 ]; then
              echo "[ERROR] shard ${shard} (PID ${pid}) failed with exit ${sc}" >&2
              ec=$sc
            fi
            shard=$((shard+1))
          done
          return $ec
        }

        # Stage 1 (load: raw dataset -> {{dataset}}_loaded Parquet via MANO FK) now
        # runs in the reconstruction `v2d_task_library_loader` load workflow.
        # This workflow CONSUMES its output:
        # ${LOADED_DIR} is populated from the {{dataset}}_loaded/ input (see
        # `inputs:` above), not generated here.

        # Stage 1.6 (HOT3D only): segment long loaded sequences into atomic
        # hand-object interaction clips bounded by contact events. The
        # segmenter only consumes loader-stage fields (mano_*_tips_distance,
        # mano_*_object_contact_part_ids), so it can run BEFORE retarget;
        # every downstream stage (URDFs, retarget, visualize, dummy_agent,
        # quality filter) then operates on atomic segments instead of the
        # original ~90-second sequences. Penetration filtering is handled
        # transparently in Stage 6 — ``hand_penetration.py`` is auto-discovered
        # by ``data_assessor.py`` and wraps ``filter_penetrations.py``.
        if [ "{{dataset}}" = "hot3d" ] && \
           { [ "${STAGES}" = "all" ] || [ "${STAGES}" = "process" ]; }; then
          echo "=== Stage 1.6: HOT3D segmentation ==="
          SEGMENTED_LOADED_DIR=${LOADED_DIR}_segmented
          rm -rf "${SEGMENTED_LOADED_DIR}"
          eval python scripts/segment_to_atomic.py \
            --input_dir ${LOADED_DIR} \
            --output_dir ${SEGMENTED_LOADED_DIR} \
            ${FILTER_ARGS}
          seg_count=$(ls -1d ${SEGMENTED_LOADED_DIR}/sequence_id=* 2>/dev/null | wc -l)
          full_count=$(ls -1d ${LOADED_DIR}/sequence_id=* 2>/dev/null | wc -l)
          echo "=== Stage 1.6: ${seg_count} segments from ${full_count} full sequences ==="
          # Publish the segmented loaded dir alongside the original full
          # loaded dir so downstream consumers can pick either granularity.
          cp -r ${SEGMENTED_LOADED_DIR} ${OUTPUT}/{{dataset}}_loaded_segmented
          # Subsequent stages (URDFs, retarget, …) read from ${LOADED_DIR};
          # point that variable at the segmented dir so they see atomic clips.
          LOADED_DIR=${SEGMENTED_LOADED_DIR}
          # Drop --max_sequences so downstream stages process ALL segments
          # (Stage 1's limit already constrained the inputs; segments are
          # the real downstream units now). Sequence-id/pattern filters are
          # preserved by re-deriving FILTER_ARGS from the templated vars.
          FILTER_ARGS=""
          if [ -n "{{sequence_pattern}}" ] && [ "{{sequence_pattern}}" != ".*" ]; then
            FILTER_ARGS="${FILTER_ARGS} --sequence_pattern '{{sequence_pattern}}'"
          fi
          if [ -n "{{sequence_id}}" ]; then
            FILTER_ARGS="${FILTER_ARGS} --sequence_id {{sequence_id}}"
          fi
        fi

        # Stage 1.5: Generate rigid URDFs (one-shot — not per-sequence)
        if [ "${STAGES}" = "all" ] || [ "${STAGES}" = "process" ]; then
          echo "=== Stage 1.5: Generating rigid URDFs for {{dataset}} ==="
          python scripts/generate_rigid_urdfs.py --dataset {{dataset}} || true
          URDF_SRC=source/robotic_grounding/robotic_grounding/assets/urdfs/{{dataset}}
          if [ -d "${URDF_SRC}" ]; then
            cp -r ${URDF_SRC} ${OUTPUT}/{{dataset}}_urdfs
          fi
        fi

        # Stage 2: IK retargeting -> retargeted Parquet (sharded)
        if [ "${STAGES}" = "all" ] || [ "${STAGES}" = "process" ]; then
          echo "=== Stage 2: Retargeting {{dataset}} (${SHARDS} shards) ==="
          PIDS=()
          for i in $(seq 0 $((SHARDS-1))); do
            (
              export CUDA_VISIBLE_DEVICES=$i
              eval python scripts/retarget/run_retarget.py \
                --dataset {{dataset}} \
                --input_dir ${LOADED_DIR} \
                --output_dir ${PROCESSED_DIR} \
                --device cuda:0 \
                --save ${FILTER_ARGS} \
                --shard_id $i --num_shards ${SHARDS}
            ) &
            PIDS+=($!)
          done
          wait_shards "${PIDS[@]}"
          echo "=== Copying processed data to output ==="
          cp -r ${PROCESSED_DIR} ${OUTPUT}/{{dataset}}_processed
        fi

        # Stage 3: Reconstruct support surfaces -> USD (sharded)
        if [ "${STAGES}" = "all" ] || [ "${STAGES}" = "reconstruct" ]; then
          echo "=== Stage 3: Reconstructing support surfaces for {{dataset}} (${SHARDS} shards) ==="
          PIDS=()
          for i in $(seq 0 $((SHARDS-1))); do
            (
              export CUDA_VISIBLE_DEVICES=$i
              eval python scripts/reconstruct_support_surfaces.py \
                --input_dir ${LOADED_DIR} \
                --dataset {{dataset}} \
                ${FILTER_ARGS} \
                --shard_id $i --num_shards ${SHARDS}
            ) &
            PIDS+=($!)
          done
          wait_shards "${PIDS[@]}"
          # Datasets where every object is held/grounded (e.g. h2o) never
          # produce a reconstructed_stage dir — skip the copy instead of
          # failing the whole workflow under `set -e`.
          if [ -d "${RECONSTRUCTED_DIR}" ]; then
            echo "=== Copying reconstructed data to output ==="
            cp -r ${RECONSTRUCTED_DIR} ${OUTPUT}/reconstructed_stage
          else
            echo "=== No reconstructed stage to copy (no support surfaces for {{dataset}}) ==="
          fi
        fi

        # Stage 4: Viser + pyrender MP4s (sharded).
        # Pyrender MP4s buffer every rendered frame in RAM (see
        # ``_offline_video.py::save``), so datasets with very long sequences
        # (oakink2 at 120 FPS ~ 4k frames/seq = ~11 GB per clip, × 8 shards
        # running concurrently) OOM the pod.  Stage 5's dummy_agent already
        # produces Isaac Sim MP4s with the robot hands, so the pyrender
        # MP4 is redundant there — we keep the .viser recordings, which
        # are compact and let anyone replay interactively in a browser.
        if [ "${STAGES}" = "all" ] || [ "${STAGES}" = "visualize" ]; then
          echo "=== Stage 4: Generating Viser + MP4 visualizations for {{dataset}} (${SHARDS} shards) ==="
          MP4_ARG="--save_mp4"
          if [ "{{dataset}}" = "oakink2" ]; then
            MP4_ARG=""
            echo "  (skipping pyrender MP4 for oakink2 — long sequences OOM the pod)"
          fi
          PIDS=()
          for i in $(seq 0 $((SHARDS-1))); do
            (
              export CUDA_VISIBLE_DEVICES=$i
              eval python scripts/retarget/vis_retargeted.py \
                --input_dir ${PROCESSED_DIR} \
                --save_html \
                ${MP4_ARG} \
                --html_dir ${OUTPUT}/{{dataset}}_html \
                ${FILTER_ARGS} \
                --shard_id $i --num_shards ${SHARDS}
            ) &
            PIDS+=($!)
          done
          wait_shards "${PIDS[@]}"
        fi

        # Stage 5: Isaac Lab MP4s via dummy_agent (robot + object).
        # Experiment: shard across all GPUs to parallelize sequence rendering.
        # A prior attempt went slower than sequential due to Isaac Sim startup
        # contention (shader cache, EGL drivers, VRAM); revisit with current
        # image + drivers and re-measure.  Fall back to sequential by setting
        # SHARDS=1 at the workflow level.
        if [ "${STAGES}" = "all" ] || [ "${STAGES}" = "video" ]; then
          echo "=== Stage 5: Recording scene videos for {{dataset}} (${SHARDS} shards) ==="
          VIDEO_DIR=${OUTPUT}/{{dataset}}_videos
          mkdir -p ${VIDEO_DIR}

          # Enumerate sequences once, then distribute across shards by index
          # mod SHARDS so the work is roughly balanced.  The per-sequence body
          # is the same as the old sequential path — only the surrounding
          # shard fan-out is new.
          SEQ_DIRS=(${PROCESSED_DIR}/sequence_id=*/robot_name=*)

          PIDS=()
          for shard in $(seq 0 $((SHARDS-1))); do
            (
              export CUDA_VISIBLE_DEVICES=$shard
              for idx in "${!SEQ_DIRS[@]}"; do
                if [ $((idx % SHARDS)) -ne $shard ]; then
                  continue
                fi
                SEQ_DIR="${SEQ_DIRS[$idx]}"
                [ -d "${SEQ_DIR}" ] || continue
                # URL-decode the partition-directory name so oakink2's
                # `++`-encoded IDs (sequence_id=scene_01__A007%2B%2Bseq__…)
                # don't end up in file paths as literal `%2B`.  `%2` in any
                # path breaks gymnasium's RecordVideo wrapper, which does
                # `msg % args` over its own log lines and treats `%2` as a
                # format placeholder.
                #
                # We *don't* call out to `python -c` for this — in this image
                # `python` is a wrapper around `isaaclab.sh -p` that prints
                # `[INFO] Using python from: …` plus tset escape sequences on
                # stdout before the real interpreter runs, so $(python -c …)
                # captures that banner and poisons SEQ_ID.  Pure-bash
                # parameter expansion + `printf '%b'` does the decode without
                # a subprocess.
                RAW_ID=$(basename $(dirname "${SEQ_DIR}") | sed 's|sequence_id=||')
                # shellcheck disable=SC2059  # intentional: %b interprets \xHH
                SEQ_ID=$(printf '%b' "${RAW_ID//%/\\x}")
                # Idempotent: skip sequences already rendered (partial resume).
                [ -f "${VIDEO_DIR}/${SEQ_ID}.mp4" ] && continue
                # Shard-scoped TMP dir avoids collisions when two shards pick
                # up the same SEQ_ID by accident (shouldn't happen with modulo
                # distribution, but cheap insurance if the array ever grows
                # duplicates).
                TMP_VID=/tmp/scene_video_shard${shard}_${SEQ_ID}
                rm -rf ${TMP_VID}
                # Wrap in `timeout --signal=KILL` — when Isaac Sim hits a CUDA
                # assertion its Omniverse shutdown can deadlock, so `|| true`
                # alone would leave the bash loop waiting forever.  5 min is
                # plenty of headroom for ~1 min expected per-sequence work.
                # Success sentinel goes IN the published tree, colocated
                # with the parquet it vouches for.  PROCESSED_DIR → OUTPUT
                # was copied in Stage 2 (line 179) with the same
                # sequence_id=…/robot_name=… layout, so a straight path
                # rebase is enough.  Stage 6 below keys off
                # `.dummy_agent_ok` presence to decide kept vs. invalid.
                REL_SEQ=${SEQ_DIR#${PROCESSED_DIR}/}
                OUTPUT_SEQ_DIR=${OUTPUT}/{{dataset}}_processed/${REL_SEQ}
                timeout --signal=KILL 300 python scripts/rsl_rl/dummy_agent.py \
                  --task Sharpa-V2P-v0-Play \
                  --motion_file ${SEQ_DIR} \
                  --num_envs 1 --headless \
                  --record_video --output_dir ${TMP_VID} --video_length 300 \
                  --success_marker ${OUTPUT_SEQ_DIR}/.dummy_agent_ok || true
                if [ -f "${TMP_VID}/rl-video-step-0.mp4" ]; then
                  mv ${TMP_VID}/rl-video-step-0.mp4 ${VIDEO_DIR}/${SEQ_ID}.mp4
                fi
                rm -rf ${TMP_VID}
              done
            ) &
            PIDS+=($!)
          done
          wait_shards "${PIDS[@]}"

          # Stage 6: Data quality filter.
          # Runs `scripts/data_assessor.py` with auto-discovered checks under
          # `scripts/data_quality_checks/`. The `dummy_agent_success` check
          # reads the `.dummy_agent_ok` sentinel left behind by Stage 5;
          # content checks (fitting_error, ik_task_error, sequence_length,
          # tip_distance) read parquet columns.  Any sequence failing at least
          # one check is moved to `${dataset}_processed_invalid/`.  The
          # per-sequence metrics CSV is published alongside the data so
          # downstream consumers can grep reasons for rejection.
          # Fail-open: `|| true` on the assessor means an assessor bug ships
          # all sequences as valid rather than dropping the whole run.
          if [ -d "${OUTPUT}/{{dataset}}_processed" ]; then
            echo "=== Stage 6: Data quality filter ==="
            REJECT_FILE=/tmp/{{dataset}}_rejected.txt
            QUALITY_CSV=${OUTPUT}/{{dataset}}_quality.csv
            rm -f "${REJECT_FILE}"
            python scripts/data_assessor.py \
              --input_dir ${OUTPUT}/{{dataset}}_processed \
              --reject --output_reject ${REJECT_FILE} \
              --output_csv ${QUALITY_CSV} || true

            INVALID_DIR=${OUTPUT}/{{dataset}}_processed_invalid
            mkdir -p "${INVALID_DIR}"
            moved=0
            if [ -s "${REJECT_FILE}" ]; then
              while IFS= read -r SEQ_ID; do
                [ -z "${SEQ_ID}" ] && continue
                SRC="${OUTPUT}/{{dataset}}_processed/sequence_id=${SEQ_ID}"
                [ -d "${SRC}" ] && mv "${SRC}" "${INVALID_DIR}/" && moved=$((moved+1))
              done < "${REJECT_FILE}"
            fi
            # Sentinels are workflow-internal bookkeeping; strip before OSMO
            # publishes the dataset so the manifest stays clean.
            find "${OUTPUT}/{{dataset}}_processed" -name .dummy_agent_ok -delete 2>/dev/null || true
            find "${INVALID_DIR}" -name .dummy_agent_ok -delete 2>/dev/null || true
            [ ${moved} -eq 0 ] && rmdir "${INVALID_DIR}" 2>/dev/null || true
            echo "=== Stage 6: moved ${moved} invalid sequence(s); quality CSV: ${QUALITY_CSV} ==="
          fi
        fi

        echo "=== Done ==="

default-values:
  workflow_name: robotic_grounding_retarget
  # TODO(public-release): internal image registry (nvcr.io/nvstaging) — replace before open-sourcing.
  image: nvcr.io/nvstaging/isaac-amr/robotic-grounding:datasets
  stages: all
  dataset: arctic
  # TODO(public-release): input_url/output_url point to internal NVIDIA storage
  # (pdx.s8k.io / AUTH_team-isaac). Replace the swift host + bucket (or override
  # via --set) before open-sourcing.
  input_url: swift://pdx.s8k.io/AUTH_team-isaac/datasets/v2d/human_motion_data/{{dataset}}/
  output_url: swift://pdx.s8k.io/AUTH_team-isaac/datasets/v2d/human_motion_data/{{dataset}}/
  sequence_pattern: ".*"
  sequence_id: ""
  max_sequences: ""
  # Deprecated/unused: output is now a swift `url:` (see outputs above), not a
  # versioned OSMO dataset, so this suffix no longer affects anything. Kept so
  # existing `--set dataset_suffix=...` callers don't error. For experiment
  # isolation, override output_url to a scratch prefix instead.
  dataset_suffix: ""
  # Sharding: each stage fans out into SHARDS parallel processes, each pinned
  # to CUDA_VISIBLE_DEVICES=<shard_id>.  Defaults to 8 to match the
  # 8×L40 per-task resource request above.
  shards: "8"

# Example: 3-stage pipeline — pre-train + fixed-curriculum + post-train
# =============================================================================
#
# This is the THIRD config that wires together the 3-stage pipeline. The full
# pipeline is composed of three files:
#
#   experiments/example_pre_fixed_post_stage1/  — collision-free hand warmup
#   experiments/example_pre_fixed_post_stage2/  — FixedTimestepCurriculum
#                                                 (embeds stage-3 obj_kp boost)
#   experiments/example_pre_fixed_post/         — THIS file (pipeline wrapper)
#
# What it does
# ------------
# The pipeline wrapper is read by `experiments/run_experiment.py`. The runner
# (`_run_pipeline_local`) orchestrates:
#   1. Run stage 1 from scratch (or resume if a stage-1 checkpoint exists).
#   2. Locate stage 1's checkpoint via `_find_latest_checkpoint(run_name)`.
#   3. Inject `resume_from=<stage1_checkpoint>` into stage 2's config.
#   4. Run stage 2 (which embeds stage 3 in its FixedTimestepCurriculum tail).
#
# On OSMO the launcher fans stage 1 + stage 2 out per sequence; the W&B
# artifact glue lets stage 2 download stage 1's checkpoint independently.
#
# Why a 3-stage process?
# ----------------------
# Stage 1 (collision-free hand-only) helps the policy learn a coherent hand
# controller WITHOUT being penalized for object collisions. This is most
# valuable when the input motion-capture data is noisy or the dataset is new
# and untested. If your data is clean, skip stage 1 and use `example_fixed_post`
# directly — the FixedTimestepCurriculum already has a built-in zero-reward
# warm-up across iters 0-4000.
#
# Schedule by stage (see also example_fixed_post for the stage 2+3 table)
# ----------------------------------------------------------------------
#   Stage 1: 1000 iters, no contacts, hand reward only, VOC=1.0
#   Stage 2: 20000 iters, FixedTimestepCurriculum, contacts re-enabled
#       - rows iter 0-4000:    hand-only zero-reward warmup
#       - rows iter 4000-16000: VOC decays 0.75 → 0.0 across 8 steps
#       - rows iter 16000+:    stage 3 boost — VOC=0, obj_kp=20, hand=0.25
#
# Usage
# -----
#   # The pipeline ID launches BOTH stages in the correct order.
#   python robotic_grounding/scripts/run_experiment.py example_pre_fixed_post --local
#   python robotic_grounding/scripts/run_experiment.py example_pre_fixed_post --osmo
#
#   # Dry-run to preview workflow:
#   python robotic_grounding/scripts/run_experiment.py example_pre_fixed_post --osmo --dry-run

id: example_pre_fixed_post
pipeline: true
stage1_exp_id: example_pre_fixed_post_stage1
stage2_config_id: example_pre_fixed_post_stage2

# ReconBody: Apple pick-and-place with whole-body tracking
#
# Usage:
#   python robotic_grounding/scripts/run_experiment.py recon_body_apple --local
id: recon_body_apple_pick
description: "ReconBody apple pick-and-place with SONIC JOINT_RESIDUAL"
run_name: recon_body_apple_pick
task: SonicG1-ReconBody-v0
motion_file: whole_body/mhr/sequence_id=apple_pick_optimized/robot_name=g1
video: true
num_envs: 1024
max_iterations: 20000
zero_actor: true
logger: wandb
log_project_name: v2p-whole-body

train_overrides:
  env.commands.motion.reset_freeze_steps: 50
  env.commands.motion.voc_decay_steps: 10
  env.commands.motion.voc_reset_scale: 1.0
  env.commands.motion.initial_virtual_object_control_curriculum_scale: 0.0
  env.episode_length_s: 5.0

osmo:
  build_image: false

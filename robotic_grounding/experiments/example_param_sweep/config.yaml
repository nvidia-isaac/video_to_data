# Example: Parameter sweep
#
# Sweeps two reward weights (contact_force × action_l1) across a grid.
# workflow.py generates one OSMO task per (contact_force_weight, action_l1_weight) pair.
#
# Usage:
#   python robotic_grounding/scripts/run_experiment.py example_sweep --osmo
#   python robotic_grounding/scripts/run_experiment.py example_sweep --local --variant cf1p0_al5e-3
id: example_param_sweep
description: "Example: contact_force × action_l1 weight sweep (2×2 = 4 tasks)"
run_name: example_param_sweep
video: false
motion_file: arctic_processed/arctic_s01_capsulemachine_grab_01/sharpa_wave

train_overrides:
  env.rewards.action_rate_l2.weight: "-5e-4"
  env.rewards.object_keypoints_tracking_exp.weight: "2.0"
  env.rewards.hand_keypoints_tracking_exp.weight: "1.0"
  # Swept parameters — overridden per variant in workflow.py
  env.rewards.contact_force_reward.weight: "1.0"
  env.rewards.action_l1.weight: "-5e-3"
  # No virtual object curriculum — train from scratch
  env.commands.dual_hands_object_tracking_command.initial_virtual_object_control_curriculum_scale: "0.0"
  env.commands.dual_hands_object_tracking_command.virtual_object_control_decay_mode: "linear"
  env.curriculum.virtual_object_control_curriculum.params.decay_mode: "linear"
  env.curriculum.virtual_object_control_curriculum.params.linear_decay_step: "0.1"
  env.curriculum.virtual_object_control_curriculum.params.wait_env_steps_since_last_decay: "6000"
  env.curriculum.virtual_object_control_curriculum.params.zero_scale_factor_threshold: "0.01"

osmo_multi_task:
  # Grid of values to sweep — workflow.py creates one task per combination
  contact_force_weights: [0.5, 1.0]
  action_l1_weights: ["-1e-3", "-5e-3"]

osmo:
  build_image: false

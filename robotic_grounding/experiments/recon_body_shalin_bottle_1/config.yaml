# ReconBody: Bottle interaction with whole-body tracking
#
# Usage:
#   python robotic_grounding/experiments/run_experiment.py recon_body_shalin_bottle_1 --local
id: recon_body_shalin_bottle_1
description: "ReconBody bottle interaction with SONIC JOINT_RESIDUAL"
run_name: recon_body_shalin_bottle_1
task: SonicG1-ReconBody-v0
# Use the explicit repo-relative partition path because nvhuman_g1_processed does not
# follow the 4-part dataset/dataset_retargeted/sequence_id/robot shorthand.
motion_file: source/robotic_grounding/robotic_grounding/assets/human_motion_data/nvhuman_g1_processed/sequence_id=rect_2026-01-26_11-09-38_shalin_bottle_1/robot_name=g1
video: true
num_envs: 4096
max_iterations: 20000
zero_actor: true
logger: wandb
log_project_name: v2d-whole-body-tpv

train_overrides:
  env.commands.motion.reset_freeze_steps: 50
  env.commands.motion.voc_decay_steps: 10
  env.commands.motion.voc_reset_scale: 1.0
  env.commands.motion.initial_virtual_object_control_curriculum_scale: 0.0
  env.episode_length_s: 5.0

osmo:
  build_image: false
  # Reuse the current whole-body training image so submits don't fall back to :latest.
  image: nvcr.io/nvstaging/isaac-amr/robotic-grounding:recon_body_apple

# ReconBody: Bottle pick-and-transfer with whole-body tracking
#
# Usage:
#   python robotic_grounding/experiments/run_experiment.py recon_body_bottle_pick_transfer --local
id: recon_body_bottle_pick_transfer
description: "ReconBody bottle pick-and-transfer with SONIC JOINT_RESIDUAL"
run_name: recon_body_bottle_pick_transfer
task: SonicG1-ReconBody-v0
motion_file: source/robotic_grounding/robotic_grounding/assets/human_motion_data/whole_body/soma/sequence_id=2026-01-26_11-09-38_bottle_pick_transfer/robot_name=g1
video: true
num_envs: 4096
max_iterations: 20000
zero_actor: true
logger: wandb
log_project_name: v2d-whole-body-tpv

train_overrides:
  env.commands.motion.reset_freeze_steps: 50
  env.commands.motion.voc_decay_steps: 10
  env.commands.motion.voc_reset_scale: 1.0
  env.commands.motion.initial_virtual_object_control_curriculum_scale: 1.0
  env.episode_length_s: 5.0

osmo:
  build_image: false
  # Reuse the current whole-body training image so submits don't fall back to :latest.
  image: nvcr.io/nvstaging/isaac-amr/robotic-grounding:recon_body_apple

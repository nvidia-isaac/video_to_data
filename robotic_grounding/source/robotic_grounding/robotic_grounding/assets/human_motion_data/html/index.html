<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Viser Recordings</title>
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 2rem; }
    h1 { font-size: 1.2rem; color: #aaa; margin-bottom: 1.5rem; }
    #recordings { display: flex; flex-direction: column; gap: 0.6rem; }
    .rec-btn {
      background: #2a2a2a; border: 1px solid #444; border-radius: 4px;
      color: #7ec8e3; padding: 0.6rem 1rem; text-align: left;
      cursor: pointer; font-size: 0.95rem; text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .rec-btn:hover { background: #333; border-color: #7ec8e3; }
    #status { margin-top: 1.5rem; color: #888; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Viser Recordings</h1>
  <div id="recordings">Loading…</div>
  <div id="status"></div>

  <script>
    // Fetch the recordings directory listing and parse .viser filenames.
    // Works because python -m http.server returns an HTML directory listing.
    fetch('/recordings/')
      .then(r => r.text())
      .then(html => {
        const matches = [...html.matchAll(/href="([^"]+\.viser)"/g)];
        const container = document.getElementById('recordings');
        const status = document.getElementById('status');

        if (matches.length === 0) {
          container.textContent = 'No .viser recordings found in /recordings/';
          return;
        }

        container.innerHTML = '';
        const base = `${location.origin}`;
        matches.forEach(m => {
          const filename = m[1].replace(/^.*\//, '');  // strip any path prefix
          const playbackPath = `${base}/recordings/${filename}`;
          const url = `/viser-client/?playbackPath=${encodeURIComponent(playbackPath)}`;

          const a = document.createElement('a');
          a.className = 'rec-btn';
          a.href = url;
          a.target = '_blank';
          a.textContent = filename.replace(/\.viser$/, '');
          container.appendChild(a);
        });

        status.textContent = `${matches.length} recording(s) found`;
      })
      .catch(e => {
        document.getElementById('recordings').textContent = 'Error loading recordings: ' + e;
      });
  </script>
</body>
</html>

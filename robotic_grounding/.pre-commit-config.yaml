default_stages: [pre-commit]
default_install_hook_types: [pre-commit, pre-push]

# Hook paths are evaluated from the git root, not this nested config directory.
exclude: ^(robotic_grounding/workflow/.*\.yaml)$

repos:
- repo: https://github.com/charliermarsh/ruff-pre-commit
  rev: 'v0.14.11'
  hooks:
    - id: ruff
      args: ['--fix', '--config', 'robotic_grounding/pyproject.toml']
      exclude: |
        (?x)^(
          robotic_grounding/scripts/rsl_rl/.*
        )$

- repo: https://github.com/psf/black
  rev: 25.12.0
  hooks:
    - id: black
      args: ['--config', 'robotic_grounding/pyproject.toml']
      verbose: true

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.19.1
  hooks:
    - id: mypy
      additional_dependencies:
        - types-pyyaml
        - types-requests
        - types-setuptools
        - types-toml
      args: [
        "--ignore-missing-imports",
        "--explicit-package-bases",
        "--follow-imports=skip",
        "--disable-error-code=has-type",
        "--config-file=robotic_grounding/pyproject.toml",
      ]

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  -   id: check-yaml
  -   id: check-json
  -   id: check-xml
  -   id: check-ast
  -   id: end-of-file-fixer
  -   id: pretty-format-json
      args: ['--autofix']
  -   id: detect-private-key
  -   id: trailing-whitespace

default_stages: [pre-commit]
default_install_hook_types: [pre-commit, pre-push]

# Hook paths are evaluated from the git root, not from this file's location.
# Pre-commit always runs hooks with cwd = git root and passes git-root-relative
# paths to them, so excludes and `--config` flags need the `robotic_grounding/`
# prefix even though the file lives inside that package.
exclude: |
  (?x)^(
    robotic_grounding/workflow/.*\.yaml
    | robotic_grounding/source/robotic_grounding/robotic_grounding/assets/human_motion_data/.*
  )$

repos:
# Normalize NVIDIA Python files to the concise 2-line Apache-2.0 SPDX header used
# in reconstruction/. Replaces legacy proprietary + verbose-Apache headers and
# inserts one where missing; third-party (e.g. Isaac Lab) headers are left alone.
- repo: local
  hooks:
    - id: license-header
      name: enforce SPDX Apache-2.0 license header
      entry: python robotic_grounding/scripts/license_header_hook.py
      language: python
      files: ^robotic_grounding/.*\.py$
      exclude: |
        (?x)^(
          robotic_grounding/scripts/rsl_rl/.*
        )$

- repo: https://github.com/charliermarsh/ruff-pre-commit
  rev: 'v0.14.11'
  hooks:
    - id: ruff
      args: ['--fix', '--config', 'robotic_grounding/pyproject.toml']
      exclude: |
        (?x)^(
          robotic_grounding/scripts/rsl_rl/.*
        )$

- repo: https://github.com/psf/black
  rev: 25.12.0
  hooks:
    - id: black
      args: ['--config', 'robotic_grounding/pyproject.toml']
      verbose: true

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.19.1
  hooks:
    - id: mypy
      additional_dependencies:
        - types-pyyaml
        - types-requests
        - types-setuptools
        - types-toml
      args: [
        "--ignore-missing-imports",
        "--explicit-package-bases",
        "--follow-imports=skip",
        "--disable-error-code=has-type",
        "--config-file=robotic_grounding/pyproject.toml",
      ]

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  -   id: check-yaml
  -   id: check-json
      exclude: ^robotic_grounding/source/robotic_grounding/robotic_grounding/assets/meshes/
  -   id: check-xml
  -   id: check-ast
  -   id: end-of-file-fixer
  -   id: pretty-format-json
      args: ['--autofix']
      exclude: ^robotic_grounding/source/robotic_grounding/robotic_grounding/assets/meshes/
  -   id: detect-private-key
  -   id: trailing-whitespace

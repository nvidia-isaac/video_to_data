stages:
  - lint
variables:
  # Using the official NVIDIA Isaac Lab 2.3.0 image
  ISAACLAB_IMAGE: nvcr.io/nvidia/isaac-lab:2.3.0
pre-commit:
  stage: lint
  image: python:3.10
  before_script:
    - apt-get update && apt-get install -y git git-lfs
    - pip install pre-commit
  script:
    - pre-commit run --all-files

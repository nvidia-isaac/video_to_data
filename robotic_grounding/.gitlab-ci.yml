stages:
  - lint
  - build
  - e2e_test

# Only run pipelines for MRs and main branch
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID                    # Run on MR pipelines
    - if: $CI_COMMIT_BRANCH == "main"              # Run on main branch pushes
    - if: $CI_COMMIT_TAG                           # Run on tags (releases)

variables:
  # Docker image name in GitLab Container Registry
  CI_IMAGE: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
  CI_IMAGE_LATEST: ${CI_REGISTRY_IMAGE}:latest

pre-commit:
  stage: lint
  image: python:3.11
  before_script:
    - apt-get update && apt-get install -y git git-lfs
    - pip install pre-commit
  script:
    - pre-commit run --all-files

build:
  stage: build
  tags: [arch-amd64]
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
    # Pull existing image for layer caching (ignore if not exists)
    - docker pull ${CI_IMAGE_LATEST} || true
  script:
    - docker build
        --cache-from ${CI_IMAGE_LATEST}
        -t ${CI_IMAGE}
        -t ${CI_IMAGE_LATEST}
        -f workflow/Dockerfile .
    - docker push ${CI_IMAGE}
    - docker push ${CI_IMAGE_LATEST}
  # Only build on main branch (skip for MRs to save time)
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - when: manual
      allow_failure: true

e2e_test:
  stage: e2e_test
  tags: [arch-amd64, gpu]
  image:
    name: ${CI_IMAGE_LATEST}
    entrypoint: [""]
  variables:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "all"
    DISPLAY: ":1"
    OMNI_HEADLESS: "1"
    CI: "true"
    ISAACLAB_PATH: "/workspace/isaaclab"
  before_script:
    - git config --global --add safe.directory "${CI_PROJECT_DIR}"
    # Re-install project from CI checkout (in case of code changes)
    - ${ISAACLAB_PATH}/isaaclab.sh -p -m pip install --no-cache-dir -e ./source/robotic_grounding
  script:
    - set -e
    - echo "Running E2E tests..."
    - ${ISAACLAB_PATH}/isaaclab.sh -p tests/test_train_e2e.py
    - echo "All tests completed successfully"
  # Allow tests to fail without blocking the pipeline
  allow_failure: true
  # Longer timeout for tests
  timeout: 30 minutes

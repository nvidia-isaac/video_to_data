name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: cd robotic_grounding && pre-commit run --all-files

  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to NVCR
        uses: docker/login-action@v3
        with:
          registry: nvcr.io
          username: ${{ secrets.NVCR_USERNAME }}
          password: ${{ secrets.NVCR_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: workflow/Dockerfile
          push: true
          tags: |
            nvcr.io/nvstaging/isaac-amr/video-to-policy:${{ github.sha }}
            nvcr.io/nvstaging/isaac-amr/video-to-policy:latest
          cache-from: type=registry,ref=nvcr.io/nvstaging/isaac-amr/video-to-policy:latest
          cache-to: type=inline

  e2e-test:
    runs-on: [self-hosted, gpu]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    continue-on-error: true
    timeout-minutes: 30
    container:
      image: nvcr.io/nvstaging/isaac-amr/video-to-policy:latest
      options: --runtime=nvidia --gpus all
      env:
        NVIDIA_VISIBLE_DEVICES: all
        NVIDIA_DRIVER_CAPABILITIES: all
        OMNI_HEADLESS: "1"
        CI: "true"
        ISAACLAB_PATH: /workspace/isaaclab
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install project
        run: ${ISAACLAB_PATH}/isaaclab.sh -p -m pip install --no-cache-dir -e ./robotic_grounding/source/robotic_grounding
      - name: Run E2E tests
        run: ${ISAACLAB_PATH}/isaaclab.sh -p robotic_grounding/tests/test_train_e2e.py

name: Robotic Grounding CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ## ------------------------------------------
  ## Linting and formatting (pre-commit)
  ## ------------------------------------------
  lint:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('robotic_grounding/.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-
      - name: Run pre-commit
        run: |
          cd robotic_grounding
          pre-commit run --show-diff-on-failure --files $(git ls-files .)

  ## ------------------------------------------
  ## Build & Test (GPU required)
  ## ------------------------------------------
  build_and_test:
    name: Build & Test
    needs: [lint]
    runs-on: [self-hosted, gpu]
    timeout-minutes: 180
    env:
      DOCKER_IMAGE: robotic-grounding-ci-${{ github.run_id }}
      NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: NGC Login
        run: |
          if [ -n "$NGC_API_KEY" ]; then
            echo "Logging into NGC registry..."
            docker login -u \$oauthtoken -p $NGC_API_KEY nvcr.io
            echo "Successfully logged into NGC registry"
          else
            echo "NGC_API_KEY not available - skipping NGC login"
          fi
      - name: Build Docker image
        run: |
          echo "::group::Build Docker image"
          time docker build -f robotic_grounding/workflow/Dockerfile -t $DOCKER_IMAGE ./robotic_grounding
          echo "::endgroup::"
      - name: Run E2E tests
        run: |
          echo "::group::E2E Tests"
          docker run --name robotic-grounding-e2e-${{ github.run_id }} \
            --entrypoint bash --gpus all --network=host \
            -v ${{ github.workspace }}/robotic_grounding/tests:/workspace/video_to_data/robotic_grounding/tests \
            -e ACCEPT_EULA=Y \
            -e OMNI_KIT_ACCEPT_EULA=yes \
            -e OMNI_KIT_DISABLE_CUP=1 \
            -e ISAAC_SIM_HEADLESS=1 \
            -e ISAAC_SIM_LOW_MEMORY=1 \
            -e WANDB_MODE=disabled \
            -e CI=true \
            -e PYTHONUNBUFFERED=1 \
            $DOCKER_IMAGE \
            -c "\${ISAACLAB_PATH}/isaaclab.sh -p -m pytest /workspace/video_to_data/robotic_grounding/tests/test_train_e2e.py -v"
          echo "::endgroup::"
      - name: Cleanup
        if: always()
        run: |
          docker rm robotic-grounding-e2e-${{ github.run_id }} 2>/dev/null || true
          docker rmi $DOCKER_IMAGE 2>/dev/null || true

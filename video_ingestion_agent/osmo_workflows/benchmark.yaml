workflow:
  name: {{workflow_name}}
  resources:
    default:
      cpu: 88
      gpu: 8
      memory: 1600Gi
      storage: 800Gi


  tasks:
  - name: benchmark
    image: {{image}}
    command:
    - /bin/bash
    args:
    - /tmp/entry.sh
    credentials:
      sshd-keys: /tmp/.ssh
    files:
    - path: /tmp/setup_data.sh
      contents: |-
        set -ex

        cd /workspace/video_ingestion_agent

        # ---------------------------------------------------------------
        # 1. Clone EPIC-KITCHENS annotation repos (small, ~10-15 MB)
        # ---------------------------------------------------------------
        echo "Cloning EPIC-KITCHENS annotations..."
        git clone https://github.com/epic-kitchens/epic-kitchens-100-annotations.git \
            data/benchmark/epic_kitchens/annotations

        echo "Cloning C2-Action-Detection evaluation code..."
        git clone https://github.com/epic-kitchens/C2-Action-Detection.git \
            data/benchmark/epic_kitchens/C2-Action-Detection

        # ---------------------------------------------------------------
        # 2. Patch numpy compatibility in C2 eval code
        #    (np.float was removed in numpy>=1.24)
        # ---------------------------------------------------------------
        echo "Patching numpy compatibility in C2 eval code..."
        find data/benchmark/epic_kitchens/C2-Action-Detection -name "*.py" \
            -exec sed -i 's/np\.float\b/np.float64/g; s/np\.int\b/np.int64/g' {} +

        # ---------------------------------------------------------------
        # 3. Symlink NFS-mounted videos into the expected path
        # ---------------------------------------------------------------
        NFS_VIDEOS="{{nfs_videos_path}}"
        echo "Symlinking NFS videos from ${NFS_VIDEOS}..."
        mkdir -p data/benchmark/epic_kitchens/videos

        # Handle both flat layout (*.MP4) and nested EPIC layout (P*/videos/*.MP4)
        shopt -s nullglob
        count=0
        for f in "${NFS_VIDEOS}"/P*/videos/*.MP4 "${NFS_VIDEOS}"/*.MP4; do
            [ -f "$f" ] && ln -sf "$f" data/benchmark/epic_kitchens/videos/ && count=$((count+1))
        done
        shopt -u nullglob

        echo "Data setup complete. Symlinked ${count} video files."
        ls -la data/benchmark/epic_kitchens/videos/ | head -20

    - path: /tmp/run_benchmark.sh
      contents: |-
        set -ex

        cd /workspace/video_ingestion_agent

        python3 scripts/run_benchmark.py \
            -c configs/benchmark_epic_kitchens.yaml \
            --skip-bertscore \
            --resume \
            --num-gpus 8 \
            --wandb-project {{wandb_project}} \
            --wandb-run-name "{{wandb_run_name}}"

    - path: /tmp/entry.sh
      contents: |-
        set -ex

        export HF_TOKEN={{hf_token}}
        export NIM_API_KEY={{nim_api_key}}
        if [ -n "{{wandb_api_key}}" ]; then
            export WANDB_API_KEY={{wandb_api_key}}
        fi

        SCRIPTS=/workspace/video_ingestion_agent/osmo_workflows/scripts

        # Setup SSH for debugging access
        bash "${SCRIPTS}/setup_ssh.sh"

        # Prepare data (clone annotations, symlink videos)
        bash /tmp/setup_data.sh

        # Start vLLM server (background)
        export VLLM_CONFIG=configs/benchmark_epic_kitchens.yaml
        bash "${SCRIPTS}/start_vllm.sh"

        # Run the benchmark
        bash /tmp/run_benchmark.sh

        # Keep container alive for inspection
        sleep 3600

default-values:
  workflow_name: benchmark_epic_kitchens
  image: nvcr.io/nvidian/v2p_video_agent:latest
  hf_token: ""
  nim_api_key: ""
  wandb_api_key: ""
  wandb_project: "v2p-benchmark"
  wandb_run_name: ""
  nfs_videos_path: /mnt/amlfs-02/shared/liuw/v2p/epic_kitchen_p1_p9/EPIC-KITCHENS/

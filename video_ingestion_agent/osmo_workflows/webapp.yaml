workflow:
  name: {{workflow_name}}
  resources:
    default:
      cpu: 88
      gpu: 8
      memory: 1600Gi
      storage: 800Gi


  tasks:
  - name: webapp
    image: {{image}}
    command:
    - /bin/bash
    args:
    - /tmp/entry.sh
    credentials:
      sshd-keys: /tmp/.ssh
    files:
    - path: /tmp/setup_data.sh
      contents: |-
        set -ex

        cd /workspace/video_ingestion_agent

        # No symlinks needed -- the webapp UI lets users specify
        # NFS paths directly for both database retrieval and video ingestion.
        # The default paths are set in /tmp/webapp_config.yaml.

        echo "Default DB dir: {{default_db_dir}}"
        if [ -d "{{default_db_dir}}" ]; then
            echo "DB directory exists. Contents:"
            ls -la "{{default_db_dir}}/"
        else
            echo "DB directory not found at default path (user can set via webapp UI)."
        fi

    - path: /tmp/webapp_config.yaml
      contents: |-
        # Webapp config -- generated by Osmo workflow
        data_dir: "outputs/webapp"
        default_output_dir: "outputs/"
        default_db_dir: "{{default_db_dir}}"
        default_videos_dir: "{{default_videos_dir}}"
        default_clips_dir: "outputs/clips"
        config_dir: "configs"
        default_ingestion_config: "configs/ingestion.yaml"
        default_retrieval_config: "configs/retrieval.yaml"
        enable_gpu: true
        default_device: "cuda"

    - path: /tmp/start_webapp.sh
      contents: |-
        set -ex

        cd /workspace/video_ingestion_agent

        WEBAPP_PORT={{webapp_port}}

        echo "========================================"
        echo "Starting Video Ingestion Agent Webapp"
        echo "  Port: ${WEBAPP_PORT}"
        echo "  DB dir: {{default_db_dir}}"
        echo "========================================"

        # Launch the webapp (bind to 0.0.0.0 for external access)
        python3 scripts/run_webapp.py \
            --host 0.0.0.0 \
            --port "${WEBAPP_PORT}" \
            --config /tmp/webapp_config.yaml

    - path: /tmp/entry.sh
      contents: |-
        set -ex

        export HF_TOKEN={{hf_token}}
        export NIM_API_KEY={{nim_api_key}}

        SCRIPTS=/workspace/video_ingestion_agent/osmo_workflows/scripts

        # Setup SSH for debugging access
        bash "${SCRIPTS}/setup_ssh.sh"

        # Verify default paths (no symlinking; users set paths in the webapp UI)
        bash /tmp/setup_data.sh

        # Start vLLM server (background, for ingestion and agent queries)
        bash "${SCRIPTS}/start_vllm.sh"

        # Start the Gradio webapp (foreground, keeps container alive)
        bash /tmp/start_webapp.sh


default-values:
  workflow_name: webapp
  image: nvcr.io/nvidian/v2p_video_agent:latest
  hf_token: ""
  nim_api_key: ""
  default_db_dir: /mnt/amlfs-02/shared/liuw/v2p/database
  default_videos_dir: /mnt/amlfs-02/shared/liuw/v2p/hot3d/videos/
  webapp_port: "7860"

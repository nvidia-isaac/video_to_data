workflow:
  name: {{workflow_name}}
  resources:
    default:
      cpu: 88
      gpu: 8
      memory: 1600Gi
      storage: 800Gi


  tasks:
  - name: batch_ingestion
    image: {{image}}
    command:
    - /bin/bash
    args:
    - /tmp/entry.sh
    credentials:
      sshd-keys: /tmp/.ssh
    files:
    - path: /tmp/setup_data.sh
      contents: |-
        set -ex

        cd /workspace/video_ingestion_agent

        # ---------------------------------------------------------------
        # Symlink NFS-mounted videos into the expected input path
        # ---------------------------------------------------------------
        NFS_VIDEOS="{{nfs_videos_path}}"
        INPUT_DIR="{{input_dir}}"
        echo "Setting up input videos from ${NFS_VIDEOS}..."
        mkdir -p "${INPUT_DIR}"

        # If the NFS path itself is the directory of videos, symlink it
        if [ -d "${NFS_VIDEOS}" ]; then
            # Use find for reliable recursive discovery at any depth
            count=0
            while IFS= read -r -d '' f; do
                ln -sf "$f" "${INPUT_DIR}/" && count=$((count+1))
            done < <(find "${NFS_VIDEOS}" -type f \( \
                -iname "*.mp4" -o -iname "*.mov" -o -iname "*.mkv" -o -iname "*.avi" -o -iname "*.webm" \
            \) -print0)
            echo "Data setup complete. Symlinked ${count} video files."
        else
            echo "ERROR: NFS path does not exist: ${NFS_VIDEOS}"
            exit 1
        fi

    - path: /tmp/run_ingestion.sh
      contents: |-
        set -ex

        cd /workspace/video_ingestion_agent

        NUM_SHARDS={{num_shards}}
        INPUT_DIR="{{input_dir}}"
        OUTPUT_BASE="{{output_base_dir}}"
        EXPERIMENT="{{experiment_name}}"
        OUTPUT_DIR="${OUTPUT_BASE}/${EXPERIMENT}"

        mkdir -p "${OUTPUT_DIR}"
        echo "Experiment: ${EXPERIMENT}"
        echo "Workers: ${NUM_SHARDS} (duration-aware LPT sharding)"

        # Single Python process handles discovery, LPT sharding, and
        # spawning N parallel worker sub-processes internally.
        python3 scripts/run_batch_ingestion.py \
            --input-dir "${INPUT_DIR}" \
            -c configs/batch_ingestion.yaml \
            --output-dir "${OUTPUT_DIR}" \
            --num-shards "${NUM_SHARDS}" \
            --resume

    - path: /tmp/entry.sh
      contents: |-
        set -ex

        export HF_TOKEN={{hf_token}}
        export NIM_API_KEY={{nim_api_key}}

        SCRIPTS=/workspace/video_ingestion_agent/osmo_workflows/scripts

        # Setup SSH for debugging access
        bash "${SCRIPTS}/setup_ssh.sh"

        # Prepare data (symlink NFS videos)
        bash /tmp/setup_data.sh

        # Start vLLM server (background, shared by all workers)
        export VLLM_CONFIG=configs/batch_ingestion.yaml
        bash "${SCRIPTS}/start_vllm.sh"

        # Run ingestion (handles LPT sharding + parallel workers internally)
        bash /tmp/run_ingestion.sh

        # Keep container alive for inspection
        sleep 3600


default-values:
  workflow_name: batch_ingestion
  image: nvcr.io/nvidian/v2p_video_agent:latest
  hf_token: ""
  nim_api_key: ""
  nfs_videos_path: /mnt/amlfs-02/shared/liuw/v2p/hot3d/videos/
  input_dir: /workspace/video_ingestion_agent/data/ingestion_videos
  output_base_dir: /mnt/amlfs-02/shared/liuw/v2p/database
  experiment_name: default
  num_shards: "8"

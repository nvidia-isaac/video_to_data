# Unified Pipeline Configuration
# Ingestion (segmentation + verification + refinement) + Entity Graph

# ============================================================
# Model Configuration
# ============================================================
models:
  # Cosmos3-Nano: vLLM loads only the Reasoner (VLM) tower; serve.py adds
  # --hf-overrides for "cosmos3" model names.
  vlm_model: "nvidia/Cosmos3-Nano"
  vlm_backend: "vllm"  # "local", "api", or "vllm"
  vlm_fps: 4             # Frame sampling rate for VLM

  # LLM for entity extraction from segment descriptions
  # If null, falls back to vlm_model
  llm_model: null
  llm_backend: "vllm"  # Uses the same vLLM server as vlm_backend

  # Frame embedding model (SigLIP-2, always local)
  embedding_model: "google/siglip2-base-patch16-256"
  embedding_batch_size: 16

  # Device and authentication
  device: "cuda"
  api_key: null  # Or set NIM_API_KEY env var

  # vLLM backend settings (only used when vlm_backend: "vllm")
  # Start server with: python scripts/serve.py -c configs/ingestion.yaml
  # Stop server with:  python scripts/serve.py --stop
  vllm_url: "http://localhost:8000/v1"
  vllm_gpu_memory_utilization: 0.8  # Reserve ~20% GPU for SigLIP embeddings
  vllm_local_media: true  # Use file:// URLs (fastest, requires same machine)

# ============================================================
# Paths
# ============================================================
paths:
  input_videos_dir: "data/videos"
  runs_dir: "runs"

# ============================================================
# Segmentation Configuration (Hybrid)
# ============================================================
segmentation:
  # Chunking parameters (from video_ingestion_agent)
  chunk_size: 15.0   # Seconds per chunk for VLM processing
  chunk_overlap: 1.5  # Overlap between chunks

  # Segment constraints
  min_clip_s: 1.0     # Minimum clip duration (seconds)
  max_clip_s: 30.0    # Maximum clip duration (seconds)

  # Video scanning
  video_extensions:
    - ".mp4"
    - ".mov"
    - ".mkv"
    - ".MP4"

  # VLM prompts for segmentation.
  # Defaults are in ingestion/segmentation/prompts.py.
  # Uncomment and edit below to override per-experiment.
  # system_prompt: ""
  # user_prompt: ""

# ============================================================
# Verification (Critic) Configuration
# ============================================================
verification:
  max_iterations: 3  # Maximum verify-refine iterations

  # VLM prompts for verification (critic).
  # Defaults are in ingestion/segmentation/prompts.py.
  # Uncomment and edit below to override per-experiment.
  # system_prompt: ""
  # user_prompt: ""

# ============================================================
# Entity Extraction Configuration
# ============================================================
entity_extraction:
  max_time_gap: 30.0       # Max gap for entity merging (seconds)
  min_entity_confidence: 0.5
  min_relationship_confidence: 0.5

# ============================================================
# Processing (Frame Extraction)
# ============================================================
processing:
  fps: 1.0  # Frame sampling rate for embeddings

# ============================================================
# Database Configuration
# ============================================================
database:
  directory: "outputs/"
  embedding_dim: 768  # SigLIP2 base-patch16-256

# ============================================================
# Logging
# ============================================================
logging:
  level: "INFO"
  save_responses: false
  response_dir: "outputs/debug/entity_extraction"

# ============================================================
# Pipeline Feature Toggles
# ============================================================
enable_verification: false
enable_refinement: false
enable_entity_graph: true
enable_reporting: true

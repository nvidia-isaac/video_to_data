# Webapp configuration with the optional Reconstruct integration tab enabled.
#
# The `reconstruction:` block wires the Reconstruct tab at the sibling
# `reconstruction` package and at host-side weight directories. Omit
# (or set to null) to hide the tab.
#
# *** Before running this on a fresh machine ***, complete the one-time
# setup (~30 min, ~110 GB disk) documented at
# src/video_ingestion_agent/reconstruction_interface/ego_e2e/README.md:
# build the v2d_* Docker images and stage the weight bundles.
# ReconstructionConfig.validate() will refuse to enable the tab — and
# show which containers/weights are missing — until they're in place.
#
# Run with:
#   python scripts/run_webapp.py --config configs/webapp.yaml

# ─── Retrieval model: NIM API (no local vLLM, frees the GPU) ─────────
# Override the project default (vLLM) so the webapp's retrieval agent
# hits NVIDIA's hosted Inference API instead of a local vLLM server.
# Authentication via NIM_API_KEY env var (already exported in this shell).
# Drops the GPU footprint to ~0 from the webapp's side, leaving the full
# 47 GB free for the reconstruction containers.
llm_backend: api
llm_model: openai/openai/gpt-5.2  # Adjust to any NIM-served model id


# ─── Reconstruction integration tab (optional) ─────────────────────────
#
# Drives the optional Reconstruct tab. The 16-stage hand + object
# reconstruction pipeline runs end-to-end via subprocess into
# reconstruction's `.venv`; each stage shells out to a v2d_*:latest
# Docker container. Reconstruction is not part of the agent — this
# block exists to enable a worked integration example in the webapp.
reconstruction:
  # Where per-segment artifacts accumulate. One subdir per segment_id.
  out_root: outputs/webapp/reconstruction

  # Host-side weight directories. Pre-download via each container's
  # run_download_weights helper. `hand_reconstruction` is ego-only and
  # must contain MANO_RIGHT.pkl + BMC/*.npy (downloaded manually).
  weights:
    moge:                /tmp/moge_weights
    grounding_dino:      /tmp/gd_weights
    sam2:                /tmp/sam2_weights
    sam3d:               /tmp/sam3d_weights
    foundation_pose:     /tmp/fp_weights
    hand_reconstruction: /tmp/hand_weights    # ego-only

  # Container image tags — defaults match reconstruction/scripts/build_containers.sh.
  images:
    moge:            v2d_moge:latest
    grounding_dino:  v2d_grounding_dino:latest
    sam2:            v2d_sam2:latest
    sam3d:           v2d_sam3d:latest
    mesh:            v2d_mesh:latest
    foundation_pose: v2d_foundation_pose:latest
    hand_alignment:  v2d_hand_alignment:latest    # ego-only

  # Ego e2e bridge: the wrapper subprocesses into reconstruction's `.venv`
  # to invoke `run_v2d_ego_e2e.py` (16-step orchestrator). That venv holds
  # only the lightweight orchestration packages (no torch / CUDA) — set up
  # via `cd reconstruction && uv venv && uv pip install -e modules/v2d_docker
  # -e modules/v2d_common -e modules/v2d_depth -e modules/v2d_pipelines
  # -e modules/v2d_*/docker trimesh`. See reconstruction/docs/ego_e2e_setup.md.
  reconstruction_python: ../reconstruction/.venv/bin/python
  reconstruction_root:   ../reconstruction

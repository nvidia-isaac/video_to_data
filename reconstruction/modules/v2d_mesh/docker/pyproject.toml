[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-mesh-docker"
version = "0.1.0"
description = "Docker orchestration scripts for v2d_mesh"
requires-python = ">=3.10"
dependencies = ["v2d-docker"]

[tool.setuptools]
packages = ["v2d.mesh.docker"]

[tool.setuptools.package-dir]
"v2d.mesh.docker" = "."

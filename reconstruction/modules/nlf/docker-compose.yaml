x-nlf-base: &nlf-base
  build:
    context: ../..
    dockerfile: modules/nlf/Dockerfile
  volumes:
    - ../../data:/app/data
    - ../../modules/nlf/data:/app/modules/nlf/data
  environment:
    - SMPL_MODEL_ROOT=/app/modules/nlf/data/smpl_models
    - NLF_WEIGHTS_PATH=/app/modules/nlf/data/weights/nlf_l_multi_0.3.2.torchscript

services:
  nlf-video-to-smpl:
    <<: *nlf-base
    extends:
      file: ../common-compose.yaml
      service: base-gpu
    entrypoint: ["python3", "modules/nlf/video_to_smpl.py"]

  nlf-render-smpl-overlay:
    <<: *nlf-base
    extends:
      file: ../common-compose.yaml
      service: base-gpu
    entrypoint: ["python3", "modules/nlf/render_smpl_overlay.py"]

services:
  nlf-api:
    build:
      context: ../..
      dockerfile: modules/nlf/Dockerfile
    container_name: nlf-api
    ports:
      - "8005:8005"
    volumes:
      - ../../data:/app/data
      - ../../modules/nlf/data:/app/modules/nlf/data
    environment:
      - REDIS_URL=redis://redis:6379/0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - reconstruction-network

  nlf-worker:
    build:
      context: ../..
      dockerfile: modules/nlf/Dockerfile
    container_name: nlf-worker
    command: python3 modules/nlf/worker.py
    volumes:
      - ../../data:/app/data
      - ../../modules/nlf/data:/app/modules/nlf/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SMPL_MODEL_ROOT=/app/modules/nlf/data/smpl_models
      - NLF_WEIGHTS_PATH=/app/modules/nlf/data/weights/nlf_l_multi_0.3.2.torchscript
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - reconstruction-network

networks:
  reconstruction-network:
    external: true


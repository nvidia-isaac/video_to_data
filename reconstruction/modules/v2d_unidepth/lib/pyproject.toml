[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-unidepth-lib"
version = "0.1.0"
description = "UniDepth-based monocular depth estimation library"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "Pillow",
    "opencv-python",
    "unidepth @ git+https://github.com/lpiccinelli-eth/UniDepth.git",
    "v2d-common",
]

[tool.setuptools]
packages = ["v2d.unidepth.lib"]

[tool.setuptools.package-dir]
"v2d.unidepth.lib" = "."

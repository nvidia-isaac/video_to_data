[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-sam3d-lib"
version = "0.1.0"
description = "SAM3D-based image to 3D mesh library"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "Pillow",
    "opencv-python",
    "trimesh",
    "omegaconf",
    "hydra-core",
    "seaborn",
    "loguru",
    "timm",
    "huggingface-hub",
    "v2d-datatypes",
]

[tool.setuptools]
packages = ["v2d.sam3d.lib"]

[tool.setuptools.package-dir]
"v2d.sam3d.lib" = "."

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-hand-detector-lib"
version = "0.1.0"
description = "Single-image hand detection (bbox + handedness) via MediaPipe Hands"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "Pillow",
    "opencv-python",
    "mediapipe",
    "v2d-common",
]

[tool.setuptools]
packages = ["v2d.hand_detector.lib"]

[tool.setuptools.package-dir]
"v2d.hand_detector.lib" = "."

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-hoi-object-reconstruction-docker"
version = "0.1.0"
description = "Docker orchestration scripts for HOI object reconstruction"
requires-python = ">=3.10"
dependencies = [
    "v2d-foundation-pose-docker",  # provides v2d.foundation_pose.docker
    "v2d-common",                  # provides v2d.common.datatypes.Transform3d etc.
]

[tool.setuptools]
packages = ["v2d_hoi_object_reconstruction.docker"]

[tool.setuptools.package-dir]
"v2d_hoi_object_reconstruction.docker" = "."

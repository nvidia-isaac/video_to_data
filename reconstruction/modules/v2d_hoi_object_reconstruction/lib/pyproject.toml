[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-hoi-object-reconstruction-lib"
version = "0.1.0"
description = "HOI object reconstruction library (runs inside container)"
requires-python = ">=3.10"
dependencies = [
    "v2d-common",
]

[tool.setuptools]
packages = ["v2d_hoi_object_reconstruction.lib"]

[tool.setuptools.package-dir]
"v2d_hoi_object_reconstruction.lib" = "."

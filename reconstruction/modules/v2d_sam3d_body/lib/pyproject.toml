[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-sam3d-body-lib"
version = "0.1.0"
description = "SAM3D-Body human pose and shape estimation"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "omegaconf",
    "v2d-common",
    "v2d-mv[io,math,vis]",
]

[tool.setuptools]
packages = ["v2d.sam3d_body.lib"]

[tool.setuptools.package-data]
"v2d.sam3d_body.lib" = ["*.yaml"]

[tool.setuptools.package-dir]
"v2d.sam3d_body.lib" = "."

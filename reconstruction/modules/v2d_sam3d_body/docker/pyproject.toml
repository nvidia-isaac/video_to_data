[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-sam3d-body-docker"
version = "0.1.0"
description = "Docker orchestration scripts for SAM3D-Body"
requires-python = ">=3.10"
dependencies = ["v2d-docker", "omegaconf"]

[tool.setuptools]
packages = ["v2d.sam3d_body.docker"]

[tool.setuptools.package-dir]
"v2d.sam3d_body.docker" = "."

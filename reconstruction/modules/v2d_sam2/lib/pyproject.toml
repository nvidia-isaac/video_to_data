[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-sam2-lib"
version = "0.1.0"
description = "SAM2-based video segmentation library"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "Pillow",
    "opencv-python",
    "flask",
    "decord",
    "huggingface-hub",
    "SAM-2 @ git+https://github.com/facebookresearch/sam2.git",
    "v2d-common",
    "v2d-mv",
]

[tool.setuptools]
packages = ["v2d.sam2.lib"]

[tool.setuptools.package-dir]
"v2d.sam2.lib" = "."

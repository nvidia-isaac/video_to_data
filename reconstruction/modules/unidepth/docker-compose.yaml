x-unidepth-base: &unidepth-base
  build:
    context: ../..
    dockerfile: modules/unidepth/Dockerfile
  volumes:
    - ../../modules/unidepth/data/checkpoints:/workspace/modules/unidepth/data/checkpoints
    - ../../modules/unidepth/data:/workspace/modules/unidepth/data
  environment:
    - CHECKPOINT_DIR=/workspace/modules/unidepth/data/checkpoints/unidepth-v2-vitl14
    - DATA_DIR=/data

services:
  unidepth-video-to-depth:
    <<: *unidepth-base
    extends:
      file: ../common-compose.yaml
      service: base-gpu
    entrypoint: ["python", "/workspace/modules/unidepth/video_to_depth.py"]

  unidepth-image-to-depth:
    <<: *unidepth-base
    extends:
      file: ../common-compose.yaml
      service: base-gpu
    entrypoint: ["python", "/workspace/modules/unidepth/image_to_depth.py"]

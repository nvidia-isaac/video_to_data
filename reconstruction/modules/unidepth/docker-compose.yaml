x-unidepth-base: &unidepth-base
  build:
    context: ../..
    dockerfile: modules/unidepth/Dockerfile
  volumes:
    - ../../modules/unidepth/checkpoints:/workspace/modules/unidepth/checkpoints
    - ../../modules/unidepth/data:/workspace/modules/unidepth/data
  environment:
    - CHECKPOINT_DIR=/workspace/modules/unidepth/checkpoints/unidepth-v2-vitl14
    - DATA_DIR=/data
    - REDIS_URL=redis://redis:6379/0

services:
  unidepth-video-to-depth-test:
    <<: *unidepth-base
    extends:
      file: ../common-compose.yaml
      service: base-gpu
    volumes:
      - ../../modules/unidepth/tests/test_data:/workspace/modules/unidepth/tests/test_data
      - ../../modules/unidepth/checkpoints:/workspace/modules/unidepth/checkpoints
    command: [
      "python", 
      "/workspace/modules/unidepth/functions/video_to_depth.py", 
      "--video_path", "/workspace/modules/unidepth/tests/test_data/test_video.mp4", 
      "--depth_folder", "/workspace/modules/unidepth/tests/test_data/output/test_depth", 
      "--intrinsics_folder", "/workspace/modules/unidepth/tests/test_data/output/test_intrinsics"
    ]
    profiles: ["tests"]

  unidepth-video-to-depth:
    <<: *unidepth-base
    extends:
      file: ../common-compose.yaml
      service: base-gpu
    entrypoint: ["python", "/workspace/modules/unidepth/functions/video_to_depth.py"]
    profiles: ["exec"]

  unidepth-image-to-depth:
    <<: *unidepth-base
    extends:
      file: ../common-compose.yaml
      service: base-gpu
    entrypoint: ["python", "/workspace/modules/unidepth/functions/image_to_depth.py"]
    profiles: ["exec"]

  unidepth-video-to-depth-worker:
    <<: *unidepth-base
    extends:
      file: ../common-compose.yaml
      service: base-gpu
    depends_on:
      - redis
    command: ["celery", "-A", "modules.unidepth.worker", "worker", "--loglevel=info", "-Q", "unidepth.video_to_depth", "--concurrency=1", "--prefetch-multiplier=1"]
    profiles: ["workers", "api"]

  unidepth-image-to-depth-worker:
    <<: *unidepth-base
    extends:
      file: ../common-compose.yaml
      service: base-gpu
    depends_on:
      - redis
    command: ["celery", "-A", "modules.unidepth.worker", "worker", "--loglevel=info", "-Q", "unidepth.image_to_depth", "--concurrency=1", "--prefetch-multiplier=1"]
    profiles: ["workers", "api"]

  unidepth-api:
    <<: *unidepth-base
    extends:
      file: ../common-compose.yaml
      service: base-api
    ports:
      - "8003:8003"
    command: ["python", "/workspace/modules/unidepth/api.py"]
    depends_on:
      - redis
    profiles: ["api"]

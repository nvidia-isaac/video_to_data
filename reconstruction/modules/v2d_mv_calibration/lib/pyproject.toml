[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-mv-calibration-lib"
version = "0.1.0"
description = "Multi-camera extrinsic calibration with chessboard targets and Ceres BA"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "opencv-python",
    "imageio[pillow]",
    "torch",
    "pyceres",
    "pytransform3d",
    "scipy",
    "omegaconf",
    "tqdm",
    "rerun-sdk",
    "v2d-mv[math]",
]

[tool.setuptools]
packages = ["v2d.mv.calibration.lib"]

[tool.setuptools.package-dir]
"v2d.mv.calibration.lib" = "."

[tool.setuptools.package-data]
"v2d.mv.calibration.lib" = ["*.yaml"]

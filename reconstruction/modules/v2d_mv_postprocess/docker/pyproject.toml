[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-mv-postprocess-docker"
version = "0.1.0"
description = "Docker orchestration scripts for multi-view postprocessing"
requires-python = ">=3.10"
dependencies = ["v2d-docker", "omegaconf"]

[tool.setuptools]
packages = ["v2d.mv.postprocess.docker"]

[tool.setuptools.package-dir]
"v2d.mv.postprocess.docker" = "."

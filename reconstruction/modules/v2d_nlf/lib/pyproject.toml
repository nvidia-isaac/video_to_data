[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-nlf-lib"
version = "0.1.0"
description = "NLF (Neural Localizer Fields) human pose estimation library"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "Pillow",
    "opencv-python",
    "trimesh",
    "h5py",
    "open3d",
    "v2d-common",
    "v2d-foundation-pose-lib",
]

[tool.setuptools]
packages = ["v2d.nlf.lib"]

[tool.setuptools.package-dir]
"v2d.nlf.lib" = "."

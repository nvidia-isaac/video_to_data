[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-task-library-loader-docker"
version = "0.1.0"
description = "Docker orchestration for the task-library dataset loaders"
requires-python = ">=3.10"
dependencies = ["v2d-docker"]

[tool.setuptools]
packages = ["v2d.task_library_loader.docker"]

[tool.setuptools.package-dir]
"v2d.task_library_loader.docker" = "."

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "v2d-wilor-lib"
version = "0.1.0"
description = "Hand bbox + MANO regression via WiLoR (image / image list / video / masks)"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "Pillow",
    "opencv-python",
    "torch",
    "tqdm",
    "v2d-common",
]

[tool.setuptools]
packages = ["v2d.wilor.lib"]

[tool.setuptools.package-dir]
"v2d.wilor.lib" = "."

x-base-gpu: &base-gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
  volumes:
    - ./data:/data

x-base-cpu: &base-cpu
  volumes:
    - ./data:/data

services:
  ffmpeg:
    image: jrottenberg/ffmpeg
    volumes:
      - ./data:/data

  sam2-video-to-masks:
    build:
      context: .
      dockerfile: modules/sam2/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/sam2/checkpoints/sam2.1-hiera-large
    entrypoint: ["python", "/workspace/modules/sam2/tools/video_to_masks.py"]

  sam2-annotate:
    build:
      context: .
      dockerfile: modules/sam2/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    entrypoint: ["python", "/workspace/modules/sam2/tools/annotate.py"]

  moge-video-to-depth:
    build:
      context: .
      dockerfile: modules/moge/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/moge/checkpoints/moge-2-vitl-normal
    entrypoint: ["python", "/workspace/modules/moge/tools/video_to_depth.py"]

  moge-image-to-depth:
    build:
      context: .
      dockerfile: modules/moge/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/moge/checkpoints/moge-2-vitl-normal
    entrypoint: ["python", "/workspace/modules/moge/tools/image_to_depth.py"]

  unidepth-video-to-depth:
    build:
      context: .
      dockerfile: modules/unidepth/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/unidepth/checkpoints/unidepth-v2-vitl14
    entrypoint: ["python", "/workspace/modules/unidepth/tools/video_to_depth.py"]

  unidepth-image-to-depth:
    build:
      context: .
      dockerfile: modules/unidepth/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/unidepth/checkpoints/unidepth-v2-vitl14
    entrypoint: ["python", "/workspace/modules/unidepth/tools/image_to_depth.py"]

  sam3d-image-to-mesh:
    build:
      context: .
      dockerfile: modules/sam3d/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/sam3d/checkpoints/hf-download
      - TORCH_HOME=/data/sam3d/checkpoints/torch_home
      - HF_HOME=/data/sam3d/checkpoints/hf_home
    entrypoint: ["python", "/workspace/modules/sam3d/tools/image_to_mesh.py"]

  sam3d-render-debug:
    build:
      context: .
      dockerfile: modules/sam3d/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/sam3d/checkpoints/hf-download
      - TORCH_HOME=/data/sam3d/checkpoints/torch_home
      - HF_HOME=/data/sam3d/checkpoints/hf_home
    entrypoint: ["python", "/workspace/modules/sam3d/tools/render_debug_image.py"]

  foundationpose-video-to-poses:
    build:
      context: .
      dockerfile: modules/foundation_pose/Dockerfile
    <<: *base-gpu
    shm_size: '14gb'
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/foundationpose/checkpoints/foundationpose
      - FOUNDATIONPOSE_WEIGHTS_DIR=/data/foundationpose/weights
    entrypoint: ["python", "/workspace/modules/foundation_pose/tools/video_to_poses.py"]

  foundationpose-align-mesh:
    build:
      context: .
      dockerfile: modules/foundation_pose/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/foundationpose/checkpoints/foundationpose
      - FOUNDATIONPOSE_WEIGHTS_DIR=/data/foundationpose/weights
    entrypoint: ["python", "/workspace/modules/foundation_pose/tools/align_mesh_scale.py"]

  foundationpose-estimate-scale:
    build:
      context: .
      dockerfile: modules/foundation_pose/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/foundationpose/checkpoints/foundationpose
      - FOUNDATIONPOSE_WEIGHTS_DIR=/data/foundationpose/weights
    entrypoint: ["python", "/workspace/modules/foundation_pose/tools/estimate_scale.py"]

  foundationpose-transform-mesh:
    build:
      context: .
      dockerfile: modules/foundation_pose/Dockerfile
    <<: *base-cpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/foundationpose/checkpoints/foundationpose
      - FOUNDATIONPOSE_WEIGHTS_DIR=/data/foundationpose/checkpoints/weights
    entrypoint: ["python", "/workspace/modules/foundation_pose/tools/transform_mesh.py"]

  foundationpose-simplify-mesh:
    build:
      context: .
      dockerfile: modules/foundation_pose/Dockerfile
    <<: *base-cpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/foundationpose/checkpoints/foundationpose
      - FOUNDATIONPOSE_WEIGHTS_DIR=/data/foundationpose/weights
    entrypoint: ["python", "/workspace/modules/foundation_pose/tools/simplify_mesh.py"]

  foundationpose-render-overlay:
    build:
      context: .
      dockerfile: modules/foundation_pose/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/foundationpose/checkpoints/foundationpose
      - FOUNDATIONPOSE_WEIGHTS_DIR=/data/foundationpose/weights
    entrypoint: ["python", "/workspace/modules/foundation_pose/tools/render_overlay.py"]

  nlf-video-to-smpl:
    build:
      context: .
      dockerfile: modules/nlf/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - SMPL_MODEL_ROOT=/data/nlf/smpl_models
      - NLF_WEIGHTS_PATH=/data/nlf/weights/nlf_l_multi_0.3.2.torchscript
    entrypoint: ["python3", "modules/nlf/tools/video_to_smpl.py"]

  nlf-render-smpl-overlay:
    build:
      context: .
      dockerfile: modules/nlf/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - SMPL_MODEL_ROOT=/data/nlf/smpl_models
      - NLF_WEIGHTS_PATH=/data/nlf/weights/nlf_l_multi_0.3.2.torchscript
    entrypoint: ["python3", "modules/nlf/tools/render_smpl_overlay.py"]

  nlf-align-to-depth:
    build:
      context: .
      dockerfile: modules/nlf/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - SMPL_MODEL_ROOT=/data/nlf/smpl_models
      - NLF_WEIGHTS_PATH=/data/nlf/weights/nlf_l_multi_0.3.2.torchscript
    entrypoint: ["python3", "modules/nlf/tools/align_nlf_to_depth.py"]

  nlf-align-depth-to-smpl:
    build:
      context: .
      dockerfile: modules/nlf/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - SMPL_MODEL_ROOT=/data/nlf/smpl_models
      - NLF_WEIGHTS_PATH=/data/nlf/weights/nlf_l_multi_0.3.2.torchscript
    entrypoint: ["python3", "modules/nlf/tools/align_depth_to_smpl.py"]

  nlf-render-smpl-depth:
    build:
      context: .
      dockerfile: modules/nlf/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - SMPL_MODEL_ROOT=/data/nlf/smpl_models
      - NLF_WEIGHTS_PATH=/data/nlf/weights/nlf_l_multi_0.3.2.torchscript
    entrypoint: ["python3", "modules/nlf/tools/render_smpl_depth.py"]

  grounding-dino-image-to-object-bboxes:
    build:
      context: .
      dockerfile: modules/grounding_dino/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - MODEL_DIR=/data/grounding_dino/models
    entrypoint: ["python", "/workspace/modules/grounding_dino/tools/image_to_object_bboxes.py"]

  grounding-dino-image-list-to-object-bboxes:
    build:
      context: .
      dockerfile: modules/grounding_dino/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - MODEL_DIR=/data/grounding_dino/models
    entrypoint: ["python", "/workspace/modules/grounding_dino/tools/image_list_to_object_bboxes.py"]

  grounding-dino-video-to-object-bboxes:
    build:
      context: .
      dockerfile: modules/grounding_dino/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - MODEL_DIR=/data/grounding_dino/models
    entrypoint: ["python", "/workspace/modules/grounding_dino/tools/video_to_object_bboxes.py"]

  foundation-stereo-image-list-to-depth:
    build:
      context: .
      dockerfile: modules/foundation_stereo/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - MODEL_DIR=/data/foundation_stereo/models
    entrypoint: ["python", "/workspace/modules/foundation_stereo/tools/image_list_to_depth.py"]

  foundation-stereo-image-to-depth:
    build:
      context: .
      dockerfile: modules/foundation_stereo/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - MODEL_DIR=/data/foundation_stereo/models
    entrypoint: ["python", "/workspace/modules/foundation_stereo/tools/image_to_depth.py"]

  # ---------------------------------------------------------------------------
  # Test services — input from /data/test_data (./test_data), output to
  # /data/tests/<service_name>/output. Populate test_data/ before running.
  # ---------------------------------------------------------------------------

  sam2-video-to-masks-test:
    build:
      context: .
      dockerfile: modules/sam2/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/sam2/checkpoints/sam2.1-hiera-large
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python", "/workspace/modules/sam2/tools/video_to_masks.py",
      "--video_path", "/data/test_data/video.mp4",
      "--prompts_path", "/data/test_data/prompts.json",
      "--masks_dir", "/data/tests/sam2-video-to-masks-test/output/masks"]

  sam2-annotate-test:
    build:
      context: .
      dockerfile: modules/sam2/Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python", "/workspace/modules/sam2/tools/annotate.py",
      "--video_path", "/data/test_data/video.mp4",
      "--prompts_path", "/data/tests/sam2-video-to-masks-test/output/prompts.json",
      "--port", "8081"]

  moge-video-to-depth-test:
    build:
      context: .
      dockerfile: modules/moge/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/moge/checkpoints/moge-2-vitl-normal
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python", "/workspace/modules/moge/tools/video_to_depth.py",
      "--video_path", "/data/test_data/video.mp4",
      "--depth_folder", "/data/tests/moge-video-to-depth-test/output/depth",
      "--intrinsics_folder", "/data/tests/moge-video-to-depth-test/output/intrinsics"]

  moge-image-to-depth-test:
    build:
      context: .
      dockerfile: modules/moge/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/moge/checkpoints/moge-2-vitl-normal
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python", "/workspace/modules/moge/tools/image_to_depth.py",
      "--image_path", "/data/test_data/image.jpg",
      "--depth_path", "/data/tests/moge-image-to-depth-test/output/depth.png",
      "--intrinsics_path", "/data/tests/moge-image-to-depth-test/output/intrinsics.json"]

  unidepth-video-to-depth-test:
    build:
      context: .
      dockerfile: modules/unidepth/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/unidepth/checkpoints/unidepth-v2-vitl14
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python", "/workspace/modules/unidepth/tools/video_to_depth.py",
      "--video_path", "/data/test_data/video.mp4",
      "--depth_folder", "/data/tests/unidepth-video-to-depth-test/output/depth",
      "--intrinsics_folder", "/data/tests/unidepth-video-to-depth-test/output/intrinsics"]

  unidepth-image-to-depth-test:
    build:
      context: .
      dockerfile: modules/unidepth/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/unidepth/checkpoints/unidepth-v2-vitl14
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python", "/workspace/modules/unidepth/tools/image_to_depth.py",
      "--image_path", "/data/test_data/image.jpg",
      "--depth_path", "/data/tests/unidepth-image-to-depth-test/output/depth.png",
      "--intrinsics_path", "/data/tests/unidepth-image-to-depth-test/output/intrinsics.json"]

  sam3d-image-to-mesh-test:
    build:
      context: .
      dockerfile: modules/sam3d/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/sam3d/checkpoints/hf-download
      - TORCH_HOME=/data/sam3d/checkpoints/torch_home
      - HF_HOME=/data/sam3d/checkpoints/hf_home
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python", "/workspace/modules/sam3d/tools/image_to_mesh.py",
      "--image_path", "/data/test_data/image.jpg",
      "--mask_path", "/data/test_data/mask.png",
      "--mesh_path", "/data/tests/sam3d-image-to-mesh-test/output/mesh.glb",
      "--transform_path", "/data/tests/sam3d-image-to-mesh-test/output/transform.json",
      "--intrinsics_path", "/data/tests/sam3d-image-to-mesh-test/output/intrinsics.json"]

  sam3d-render-debug-test:
    build:
      context: .
      dockerfile: modules/sam3d/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/sam3d/checkpoints/hf-download
      - TORCH_HOME=/data/sam3d/checkpoints/torch_home
      - HF_HOME=/data/sam3d/checkpoints/hf_home
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data

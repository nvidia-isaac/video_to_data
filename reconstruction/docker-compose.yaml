    entrypoint: ["python", "/workspace/modules/foundation_pose/tools/estimate_scale.py",
      "--mesh", "/data/test_data/mesh.glb",
      "--rgb", "/data/test_data/image.jpg",
      "--depth", "/data/test_data/depth.png",
      "--mask", "/data/test_data/mask.png",
      "--intrinsics", "/data/test_data/intrinsics.json",
      "--transform", "/data/test_data/transform.json",
      "--output-transform", "/data/tests/foundationpose-estimate-scale-test/output/transform_refined.json"]

  foundationpose-transform-mesh-test:
    build:
      context: .
      dockerfile: modules/foundation_pose/Dockerfile
    <<: *base-cpu
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python", "/workspace/modules/foundation_pose/tools/transform_mesh.py",
      "--input-mesh", "/data/test_data/mesh.glb",
      "--output-mesh", "/data/tests/foundationpose-transform-mesh-test/output/mesh_transformed.glb",
      "--transform", "/data/test_data/transform.json"]

  foundationpose-simplify-mesh-test:
    build:
      context: .
      dockerfile: modules/foundation_pose/Dockerfile
    <<: *base-cpu
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python", "/workspace/modules/foundation_pose/tools/simplify_mesh.py",
      "--input-mesh", "/data/test_data/mesh.glb",
      "--output-mesh", "/data/tests/foundationpose-simplify-mesh-test/output/mesh_simplified.glb",
      "--faces", "1000"]

  foundationpose-render-overlay-test:
    build:
      context: .
      dockerfile: modules/foundation_pose/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/foundationpose/checkpoints/foundationpose
      - FOUNDATIONPOSE_WEIGHTS_DIR=/data/foundationpose/weights
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python", "/workspace/modules/foundation_pose/tools/render_overlay.py",
      "--video_path", "/data/test_data/video.mp4",
      "--poses_dir", "/data/tests/foundationpose-video-to-poses-test/output/poses",

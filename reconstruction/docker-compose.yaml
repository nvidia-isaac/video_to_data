      "/data/test_data/mesh.glb",
      "/data/test_data/transform.json",
      "/data/test_data/intrinsics.json",
      "/data/tests/sam3d-render-debug-test/output/debug.jpg"]

  foundationpose-video-to-poses-test:
    build:
      context: .
      dockerfile: modules/foundation_pose/Dockerfile
    <<: *base-gpu
    shm_size: '14gb'
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/foundationpose/checkpoints/foundationpose
      - FOUNDATIONPOSE_WEIGHTS_DIR=/data/foundationpose/weights
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python", "/workspace/modules/foundation_pose/tools/video_to_poses.py",
      "--video_path", "/data/test_data/video.mp4",
      "--depth_folder", "/data/test_data/depth",
      "--masks_folder", "/data/test_data/masks",
      "--camera_intrinsics_path", "/data/test_data/intrinsics.json",
      "--mesh_path", "/data/test_data/mesh.glb",
      "--poses_dir", "/data/tests/foundationpose-video-to-poses-test/output/poses"]

  foundationpose-align-mesh-test:
    build:
      context: .
      dockerfile: modules/foundation_pose/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - CHECKPOINT_DIR=/data/foundationpose/checkpoints/foundationpose

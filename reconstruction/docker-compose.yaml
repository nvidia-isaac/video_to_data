  nlf-align-to-depth-test:
    build:
      context: .
      dockerfile: modules/nlf/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - SMPL_MODEL_ROOT=/data/nlf/smpl_models
      - NLF_WEIGHTS_PATH=/data/nlf/weights/nlf_l_multi_0.3.2.torchscript
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python3", "modules/nlf/tools/align_nlf_to_depth.py",
      "--smpl_results_path", "/data/tests/nlf-video-to-smpl-test/output/smpl.h5",
      "--depth_folder", "/data/test_data/depth",
      "--masks_dir", "/data/test_data/masks",
      "--intrinsics_path", "/data/test_data/intrinsics.json",
      "--output_path", "/data/tests/nlf-align-to-depth-test/output/smpl_aligned.h5"]

  nlf-align-depth-to-smpl-test:
    build:
      context: .
      dockerfile: modules/nlf/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - SMPL_MODEL_ROOT=/data/nlf/smpl_models
      - NLF_WEIGHTS_PATH=/data/nlf/weights/nlf_l_multi_0.3.2.torchscript
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python3", "modules/nlf/tools/align_depth_to_smpl.py",
      "--depth_folder", "/data/test_data/depth",
      "--smpl_depth_folder", "/data/tests/nlf-render-smpl-depth-test/output/smpl_depth",
      "--output_depth_folder", "/data/tests/nlf-align-depth-to-smpl-test/output/depth_aligned",
      "--masks_folder", "/data/test_data/masks"]

  nlf-render-smpl-depth-test:
    build:
      context: .
      dockerfile: modules/nlf/Dockerfile
    <<: *base-gpu
    environment:
      - DATA_DIR=/data
      - SMPL_MODEL_ROOT=/data/nlf/smpl_models
      - NLF_WEIGHTS_PATH=/data/nlf/weights/nlf_l_multi_0.3.2.torchscript
    volumes:
      - ./data:/data
      - ./test_data:/data/test_data
    entrypoint: ["python3", "modules/nlf/tools/render_smpl_depth.py",
      "--smpl_params_path", "/data/tests/nlf-video-to-smpl-test/output/smpl.h5",
